    - 예산 집계: 항목(정비/자재/용역/검사/안전/기타)·집행/계획·금액·설비연결,
      연도별·분류별 자동 합계, 집행/계획 소계
    - DB 마이그레이션: DB_VER 3→4, 신규 스토어 photos/spares/budget 자동 생성(기존 데이터 유지)
    - 백업: spares/budget는 평문·암호화 백업 포함, photos(용량 큼)는 기기 로컬만
  v7 (2026-07-04) : Phase 5 — 앱 내장 PDF 뷰어(pdf.js)
    - 단선도 PDF를 새 탭이 아닌 앱 내부에서 열람: 페이지 넘김(◀▶) + 확대/축소(＋−, Ctrl+휠)
      · pdf.js 3.11.174 CDN 지연 로드(최초 1회), devicePixelRatio 고해상 렌더
      · 오프라인/로드 실패 시 기존 '새 탭 열기'로 자동 폴백(무중단)
    - viewDoc의 PDF 분기를 viewPdf()로 교체. 이미지(JPG/PNG)는 기존 핀치줌 유지
    - DB/스키마 변경 없음
  v6 (2026-07-04) : Phase 5 — 도면 문서함(라이브러리)
    - 모듈③ 확장: 도면을 '설비 소유'가 아닌 '반·계통 단위 문서함'으로 관리
      · 폴더 일괄 가져오기(webkitdirectory) + 파일명 자동분류
        (602-1=PB/602-2=DH, 폴더로 SRF 구분 / 441=22.9kV·442=6.9kV·443=저압·445=UPS·DC
         / SINGLE LINE=단선도·LOGIC=로직도·CONFIGURATION=제어감시·SYNCHRO=동기)
      · 문서함 뷰: 계통·전압·종류 필터 + 검색
      · 설비 카드 '관련 도면'에서 문서함 도면을 참조 링크(다대다, equipment.docRefs)
      · JPG/PNG는 앱 내 핀치줌, PDF는 새 탭(브라우저 기본 뷰어)로 열람
      · 모두 기기 로컬(IndexedDB)에만 저장. 원본 폴더·GitHub 코드엔 도면 데이터 미포함
    - DB 마이그레이션: DB_VER 2→3, 신규 스토어 'docs' 자동 생성(기존 데이터 유지)
      S.docs에는 메타만 로드(blob 제외), 열람 시 dbGet으로 원본 blob 조회 → 메모리 절약
  v5 (2026-07-04) : Phase 5 시작 — hwpx 직접 생성(b방식)
    - 모듈⑦ (b)방식: 회사 hwpx 양식을 템플릿으로 등록(IndexedDB meta) → 양식의
      {{토큰}} 자리를 앱 데이터로 치환 → JSZip 재압축 → .hwpx 다운로드
      · 월간 점검정비 보고서 생성(년월/개요/점검결과/정비실적/차월계획/특이사항 등)
      · section0.xml을 DOMParser로 문단 단위 병합 치환(런 분할 토큰 대응) + naive fallback
      · JSZip은 최초 사용 시 CDN 지연 로드(오프라인 시 안내). mimetype STORE 유지
    - a방식(텍스트 복사)과 병행: 양식이 없거나 오프라인이면 a방식 사용
    - DB 스키마 변경 없음: 템플릿은 기존 meta 스토어에 id='hwpxTpl'로 저장
  v4 (2026-07-04) : Phase 4 구현
    - 모듈④ 고장진단: 내장 고장모드 라이브러리(FAULTMODE_LIB) + 증상 키워드 매칭
      설비 카드 [🔍 진단]에서 증상→후보 원인·점검·조치 표시, 더보기에 라이브러리 열람
    - AI 진단 보조(마스킹): 실제 설비명·판넬번호 대신 사양(유형/전압/정격)만으로
      질의문 생성. 전송 전 "실데이터 미포함" 확인 문구 + 복사 방식(Gemini/Claude 무관).
      ※ 라이브 API 연동은 AI API 선정(로드맵 §5-4) 후. 현재는 복사→외부 AI 방식
    - 모듈③ 2단계: 설비 카드에 기동/신호 흐름 노트 + 보호계전기 요소·정정값 기록
      (equipment 레코드에 signalFlow·relays 필드로 저장 → 스토어/스키마 변경 없음)
    - DB 스키마 변경 없음(DB_VER=2 유지) → 마이그레이션 불필요
  v3 (2026-07-04) : Phase 3 구현
    - 모듈⑥ 법령 내비게이터: 내장 요약 카드 라이브러리 30개로 확장
      (전기안전관리법·산업안전보건법/규칙·항공안전법·승강기법·KEC/기술기준)
      카테고리별 그룹 표시, 각 카드에 근거 조문 + law.go.kr 원문 링크
      개정 가능 수치는 확정 표현 회피 → "원문 확인" 원칙 유지
    - 모듈⑧ 안전 서류함: 안전점검의 날 점검표 / 정전작업 절차서 템플릿 생성기
      (계통 트리에서 차단범위 자동 삽입, 텍스트 생성→복사, 스키마 변경 없음)
    - 모듈⑦ 보고서 생성기(a방식) 확장: 고장조치/수리계획/점검결과/검사수검 4종
      정리 텍스트 자동 취합(고장이력·차단범위·법령 근거) → 복사 → Claude hwpx 스킬 연계
    - DB 스키마 변경 없음(신규 스토어 없음) → 마이그레이션 불필요. laws 카드에 category 필드는 선택값
  v2 (2026-07-04) : Phase 2 구현
    - 모듈② 계통 트리: 전원→차단기→부하 입력, 차단경로 조회A, 정전영향 조회B
    - LOTO 체크리스트 (차단→검전→접지→표지) + 시행 이력 저장
    - 도면 이미지 업로드(IndexedDB)·설비 연결·핀치줌/휠줌 뷰어
    - AES-GCM 암호화 백업 (PBKDF2 비밀번호 기반, "도면 제외" 옵션)
    - 법령 내비게이터 자리 확보 (laws 스토어 + 화면, Phase 3에서 30~40개 확장)
    - DB 마이그레이션: DB_VER 1→2, 신규 스토어 tree/laws/lotologs 자동 생성
      (기존 v1 데이터는 그대로 유지 — 같은 DB를 버전만 올려 사용)
    - 설비 카드: 계통 연결 시 차단경로 자동 표시, 고장기록 차단범위 자동 삽입
  v1 (2026-07-04) : Phase 1 최초 구현
    - 설비 마스터 (seed_data_v1.json 가져오기, 검색/필터, 설비 카드)
    - 법정검사 D-day (완료 시 다음 주기 자동 계산)
    - 주기 체크리스트 (weekly/monthly/halfyear/yearly, 완료 이력 축적)
    - 대시보드 (오늘 할 일 / D-30 검사 / 진행 중 현안 / 설비 검색)
    - 고장이력 (hwpx 보고서 필드 기준: 날짜/설비/내용/원인/조치/차단범위/소요/비고)
    - IndexedDB 저장 (localStorage 미사용) + 수동 JSON 내보내기/가져오기
    - Firebase / Google Drive 백업: 골격만 (설정 화면에 자리, 미연동)
    - 도면 기능: 뼈대만 (설비 카드에 4종 도면 탭 자리)
  ============================================================
  보안: 이 파일에는 설비 실데이터·도면·API 키를 하드코딩하지 않는다.

<body>
<header>
  <h1 id="hd-title">전력계통과 업무</h1>

<div id="modal-root"></div>
<script>
/* ================= PART 1 : IndexedDB ================= */
const DB_NAME='pwr_work_v1', DB_VER=10; // v10: notes(점검·업무 메모 이력) 추가 (onupgradeneeded가 누락분만 생성 → 기존 데이터 유지)
const STORES=['equipment','inspections','checklists','checklogs','issues','faults','drawings','meta','tree','laws','lotologs','docs','photos','spares','budget','todos','measurements','permits','procs','dwgnotes','notes'];
let db=null;

function openDB(){
  return new Promise((res,rej)=>{
    const rq=indexedDB.open(DB_NAME,DB_VER);
    rq.onupgradeneeded=e=>{
      const d=e.target.result;
      for(const s of STORES){
        if(!d.objectStoreNames.contains(s)) d.createObjectStore(s,{keyPath:'id'});
      }
    };
    rq.onsuccess=e=>{db=e.target.result;res(db)};
    rq.onerror=e=>rej(e.target.error);
  });
}
function tx(store,mode='readonly'){return db.transaction(store,mode).objectStore(store)}
function dbAll(store){return new Promise((res,rej)=>{const r=tx(store).getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
function dbGet(store,id){return new Promise((res,rej)=>{const r=tx(store).get(id);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
function dbPut(store,obj){return new Promise((res,rej)=>{const r=tx(store,'readwrite').put(obj);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)})}
function dbDel(store,id){return new Promise((res,rej)=>{const r=tx(store,'readwrite').delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)})}
function dbClear(store){return new Promise((res,rej)=>{const r=tx(store,'readwrite').clear();r.onsuccess=()=>res();r.onerror=()=>rej(r.error)})}
function dbBulkPut(store,arr){
  return new Promise((res,rej)=>{
    const t=db.transaction(store,'readwrite'),o=t.objectStore(store);
    arr.forEach(x=>o.put(x));
    t.oncomplete=()=>res(); t.onerror=()=>rej(t.error);
  });
}

/* ================= PART 2 : 상태 & 유틸 ================= */
const S={equipment:[],inspections:[],checklists:[],checklogs:[],issues:[],faults:[],tree:[],laws:[],lotologs:[],drawings:[],docs:[],photos:[],spares:[],budget:[],todos:[],measurements:[],permits:[],procs:[],dwgnotes:[],notes:[],view:'home',equipMode:'list',_calYM:null,equipFilter:{q:'',plant:'',cat:''},detailId:null,_hwpxTpl:null,_noteTagSel:[],_fbCfg:null,_treeToggled:new Set(),_treeZoom:1,_treeHighlight:null,_treeVoltTab:'전체'};

async function loadAll(){
  [S.equipment,S.inspections,S.checklists,S.checklogs,S.issues,S.faults,S.tree,S.laws,S.lotologs,S.drawings]=await Promise.all(
    ['equipment','inspections','checklists','checklogs','issues','faults','tree','laws','lotologs','drawings'].map(dbAll));
  try{S._hwpxTpl=await dbGet('meta','hwpxTpl');}catch(e){S._hwpxTpl=null;}
  try{S.docs=(await dbAll('docs')).map(d=>{const{blob,...m}=d;return m;});}catch(e){S.docs=[];}
  try{[S.photos,S.spares,S.budget,S.todos,S.measurements,S.permits,S.procs]=await Promise.all(['photos','spares','budget','todos','measurements','permits','procs'].map(dbAll));}catch(e){}
  try{S.dwgnotes=await dbAll('dwgnotes');}catch(e){S.dwgnotes=[];}
  try{S.notes=await dbAll('notes');}catch(e){S.notes=[];}
  try{const row=await dbGet('meta','fbConfig');if(row&&row.json)S._fbCfg=JSON.parse(row.json);}catch(e){S._fbCfg=null;}
}
const $=s=>document.querySelector(s);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const todayStr=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')};
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2200);
}
function dday(dateStr){
  if(!dateStr)return null;
  const d=new Date(dateStr+'T00:00:00'),n=new Date();n.setHours(0,0,0,0);
  return Math.round((d-n)/86400000);
}
function ddayBadge(n){
  if(n===null)return '<span class="badge b-gray">일정미정</span>';
  if(n<0)return `<span class="badge b-red">D+${-n} 초과</span>`;
  if(n===0)return '<span class="badge b-red">D-DAY</span>';
  if(n<=30)return `<span class="badge b-yellow">D-${n}</span>`;
  return `<span class="badge b-blue">D-${n}</span>`;
}
// 주기 문자열("4년","2년","매년","3.5년") → 개월 수
function cycleMonths(c){
  if(!c)return null;
  if(c.includes('매년'))return 12;
  const m=c.match(/([\d.]+)\s*년/);
  return m?Math.round(parseFloat(m[1])*12):null;
}
function addMonths(dateStr,mo){
  const d=new Date(dateStr+'T00:00:00');d.setMonth(d.getMonth()+mo);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
// 체크리스트 주기별 "현재 기간" 키 (완료 판정용)
function periodKey(cycle,date){
  const d=date||new Date();
  const y=d.getFullYear(),m=d.getMonth()+1;
  if(cycle==='daily')return `${y}-${String(m).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  if(cycle==='weekly'){ // ISO week
    const t=new Date(d);t.setHours(0,0,0,0);t.setDate(t.getDate()+3-((t.getDay()+6)%7));
    const w1=new Date(t.getFullYear(),0,4);
    const wk=1+Math.round(((t-w1)/86400000-3+((w1.getDay()+6)%7))/7);
    return `${t.getFullYear()}-W${String(wk).padStart(2,'0')}`;
  }
  if(cycle==='monthly')return `${y}-${String(m).padStart(2,'0')}`;
  if(cycle==='quarterly')return `${y}-Q${Math.ceil(m/3)}`;
  if(cycle==='halfyear')return `${y}-H${m<=6?1:2}`;
  if(cycle==='biennial')return `${Math.floor(y/2)*2}-B`;
  return String(y); // yearly
}
const CYCLE_KO={daily:'일간',weekly:'주간',monthly:'월간',quarterly:'분기',halfyear:'반기',yearly:'연간',biennial:'격년'};
function isChkDone(c){
  const pk=periodKey(c.cycle);
  return S.checklogs.some(l=>l.chkId===c.id&&l.period===pk);
}

/* ================= PART 3 : 내보내기 / 가져오기 ================= */
const BACKUP_STORES=['equipment','inspections','checklists','checklogs','issues','faults','drawings','tree','laws','lotologs','spares','budget','todos','measurements','permits','procs','dwgnotes','notes'];
async function exportJSON(){
  const incDraw=S.drawings.length?await confirmModal('도면 이미지를 백업에 포함할까요?\n(확인=포함 / 취소=도면 제외)'):false;
  const data={app:'pwr_work',schemaVersion:2,exported:new Date().toISOString()};
  for(const s of BACKUP_STORES)
    data[s]=(s==='drawings'&&!incDraw)?[]:await dbAll(s);
  const blob=new Blob([JSON.stringify(data,null,1)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`업무앱_백업_${todayStr()}.json`;
  a.click();URL.revokeObjectURL(a.href);
  toast('백업 파일 다운로드 완료');
}
function pickFile(cb){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';
  inp.onchange=async()=>{
    const f=inp.files[0];if(!f)return;
    try{cb(JSON.parse(await f.text()))}catch(e){toast('JSON 파싱 실패: '+e.message)}
  };
  inp.click();
}
// seed_data_v1.json 가져오기 (설비/검사/체크리스트 초기 주입)
function importSeed(){
  pickFile(async data=>{
    try{
      if(!data.equipment||!data.inspections){toast('seed 형식이 아닙니다 (equipment/inspections 필드 없음)');return}
      const eq=data.equipment.map(e=>({...e,location:e.location||'',feeder:e.feeder||'',spare:e.spare||'',memo:e.memo||''}));
      const ins=data.inspections.map(i=>({...i,history:i.history||[]}));
      const chk=(data.checklists||[]).map(c=>({...c}));
      const noId=[...eq,...ins,...chk].find(x=>x.id===undefined||x.id===null);
      if(noId){toast('가져오기 실패: id 없는 항목이 있습니다');console.error('seed import: missing id',noId);return}
      await dbBulkPut('equipment',eq);
      await dbBulkPut('inspections',ins);
      await dbBulkPut('checklists',chk);
      const iss=(data.issues||[]).filter(x=>x.id);const tds=(data.todos||[]).filter(x=>x.id);
      const trn=(data.tree||[]).filter(x=>x.id);
      if(iss.length)await dbBulkPut('issues',iss);
      if(tds.length)await dbBulkPut('todos',tds);
      if(trn.length)await dbBulkPut('tree',trn);
      if(data.responsibleAreas)await dbPut('meta',{id:'areas',value:data.responsibleAreas});
      await loadAll();render();
      toast(`가져오기 완료: 설비 ${eq.length} / 검사 ${ins.length} / 체크 ${chk.length}`+(iss.length?` / 현안 ${iss.length}`:'')+(tds.length?` / 할일 ${tds.length}`:'')+(trn.length?` / 계통 ${trn.length}노드`:''));
    }catch(e){
      console.error('importSeed 실패',e);
      toast('가져오기 실패: '+e.message);
    }
  });
}
// 전체 백업 복원
function importBackup(){
  pickFile(async data=>{
    try{
      if(data.app!=='pwr_work'){toast('이 앱의 백업 파일이 아닙니다 (app 필드: '+(data.app||'없음')+')');return}
      if(!(await confirmModal('기존 데이터를 백업 파일 내용으로 덮어씁니다. 계속할까요?')))return;
      let restored=0;
      for(const s of BACKUP_STORES){
        if(Array.isArray(data[s])&&data[s].length){
          const noId=data[s].find(x=>x.id===undefined||x.id===null);
          if(noId){console.warn('스토어 '+s+'에 id 없는 항목, 건너뜀',noId);continue}
          await dbClear(s);await dbBulkPut(s,data[s]);restored+=data[s].length;
        }
      }
      await loadAll();render();
      toast(restored>0?`복원 완료 (${restored}건)`:'복원할 데이터가 없습니다 (백업 파일이 비어있음)');
    }catch(e){
      console.error('importBackup 실패',e);
      toast('복원 실패: '+e.message);
    }
  });
}

/* ====== 암호화 백업 (Web Crypto: PBKDF2 + AES-GCM) — 로드맵 §1 ====== */
const b64=b=>btoa(String.fromCharCode(...new Uint8Array(b)));
const unb64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function deriveKey(pw,salt){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:150000,hash:'SHA-256'},km,
    {name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}
async function exportEncrypted(){
  const pw=await promptModal('백업 암호를 입력하세요 (복원 시 동일 암호 필요, 분실 시 복구 불가)');
  if(!pw)return;
  if(pw.length<6){toast('암호는 6자 이상 권장 — 다시 시도');return}
  const incDraw=S.drawings.length?await confirmModal('도면 이미지를 포함할까요?\n(확인=포함 / 취소=도면 제외 백업)'):false;
  const data={app:'pwr_work',schemaVersion:2,exported:new Date().toISOString()};
  for(const s of BACKUP_STORES)data[s]=(s==='drawings'&&!incDraw)?[]:await dbAll(s);
  const salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12));
  const key=await deriveKey(pw,salt);
  const enc=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(JSON.stringify(data)));
  const out={app:'pwr_work_enc',v:1,kdf:'PBKDF2-SHA256-150k',salt:b64(salt),iv:b64(iv),data:b64(enc)};
  const blob=new Blob([JSON.stringify(out)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`업무앱_암호백업_${todayStr()}${incDraw?'':'_도면제외'}.json.enc`;
  a.click();URL.revokeObjectURL(a.href);
  toast('암호화 백업 다운로드 완료 — Drive 등에 보관 가능');

function importEncrypted(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.enc,.json,application/json';
  inp.onchange=async()=>{
    const f=inp.files[0];if(!f)return;
    try{
      const out=JSON.parse(await f.text());
      if(out.app!=='pwr_work_enc'){toast('암호화 백업 파일이 아닙니다');return}
      const pw=await promptModal('백업 암호를 입력하세요');if(!pw)return;
      const key=await deriveKey(pw,unb64(out.salt));
      const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv:unb64(out.iv)},key,unb64(out.data));
      const data=JSON.parse(new TextDecoder().decode(dec));
      if(!(await confirmModal('복호화 성공. 기존 데이터를 이 백업으로 덮어쓸까요?')))return;
      for(const s of BACKUP_STORES){
        if(Array.isArray(data[s])&&data[s].length){await dbClear(s);await dbBulkPut(s,data[s]);}
      }
      await loadAll();render();toast('암호화 백업 복원 완료');
    }catch(e){toast('복원 실패 — 암호가 틀렸거나 파일 손상')}
  };
  inp.click();
}
/* ================= PART 3.5 : Firebase 실시간 동기화 (일반 데이터만, v40) =================
   보안 방침: 설비마스터·계통트리·도면·고장이력·업무메모(notes)는 절대 Firebase에 올리지 않음
   (이 기기 IndexedDB + 암호화 Drive 백업만). Firebase로는 할일·현안·법정검사 일정·
   체크리스트 정의·완료이력(checklogs) 5개 스토어만 실시간 동기화(PC↔모바일, 기존 앱 패턴).
   config(JSON)는 사용자가 앱 UI에서 직접 입력 — GitHub 소스에 하드코딩하지 않음. */
let fbApp=null, fbAuthObj=null, fbDB=null, fbUser=null, fbUnsubs=[];
const FB_SYNC_STORES=['todos','issues','inspections','checklists','checklogs'];
function loadFirebase(){
  if(window.firebase&&window.firebase.apps)return Promise.resolve(window.firebase);
  const urls=['https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js',
    'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js',
    'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js'];
  return urls.reduce((p,src)=>p.then(()=>new Promise((res,rej)=>{
    const sc=document.createElement('script');sc.src=src;
    sc.onload=res;sc.onerror=()=>rej(new Error('Firebase 로드 실패 — 인터넷 연결 필요'));
    document.head.appendChild(sc);
  })),Promise.resolve()).then(()=>window.firebase);
}
async function fbEnsureInit(){
  if(!S._fbCfg){toast('Firebase 설정을 먼저 입력하세요');return false;}
  try{await loadFirebase();}catch(e){toast(e.message);return false;}
  if(!fbApp){
    fbApp=(firebase.apps&&firebase.apps.length)?firebase.app():firebase.initializeApp(S._fbCfg);
    fbAuthObj=firebase.auth();fbDB=firebase.firestore();
    try{await fbDB.enablePersistence({synchronizeTabs:true});}catch(e){}
    fbAuthObj.onAuthStateChanged(u=>{
      fbUser=u;
      if(u){fbStartSync();toast('Firebase 연결됨: '+(u.displayName||u.email||''));}
      else{fbStopSync();}
      render();
    });
    try{await fbAuthObj.getRedirectResult();}catch(e){}
  }
  return true;
}
async function fbLogin(){
  try{
    if(!(await fbEnsureInit()))return;
    const provider=new firebase.auth.GoogleAuthProvider();
    try{await fbAuthObj.signInWithPopup(provider);}
    catch(e){await fbAuthObj.signInWithRedirect(provider);}
  }catch(e){toast('로그인 실패: '+e.message);}
}
async function fbLogout(){
  fbStopSync();
  if(fbAuthObj)try{await fbAuthObj.signOut();}catch(e){}
  fbUser=null;render();
}
function fbStartSync(){
  if(!fbUser||!fbDB)return;
  fbStopSync();
  const base=fbDB.collection('elecApp').doc(fbUser.uid);
  FB_SYNC_STORES.forEach(store=>{
    const unsub=base.collection(store).onSnapshot(snap=>{
      snap.docChanges().forEach(async ch=>{
        if(ch.type==='removed'){
          await dbDel(store,ch.doc.id);S[store]=S[store].filter(x=>x.id!==ch.doc.id);
        }else{
          const data=ch.doc.data();
          await dbPut(store,data);
          const i=S[store].findIndex(x=>x.id===data.id);
          if(i>=0)S[store][i]=data;else S[store].push(data);
        }
      });
      render();
    },err=>console.warn('sync:'+store,err));
    fbUnsubs.push(unsub);
  });
}
function fbStopSync(){fbUnsubs.forEach(u=>{try{u();}catch(e){}});fbUnsubs=[];}
function fbPush(store,obj){
  if(!fbUser||!fbDB||!FB_SYNC_STORES.includes(store))return;
  fbDB.collection('elecApp').doc(fbUser.uid).collection(store).doc(String(obj.id)).set(obj).catch(e=>console.warn('fbPush',e));
}
function fbRemove(store,id){
  if(!fbUser||!fbDB||!FB_SYNC_STORES.includes(store))return;
  fbDB.collection('elecApp').doc(fbUser.uid).collection(store).doc(String(id)).delete().catch(e=>console.warn('fbRemove',e));
}

async function saveTodo(id){
  const title=$('#td-t').value.trim();if(!title){toast('할 일을 입력하세요');return;}
  const note=$('#td-n').value.trim();
  const startDate=$('#td-d').value||todayStr();
  if(id){
    const obj=S.todos.find(x=>x.id===id);
    obj.date=startDate;obj.title=title;obj.note=note;
    await dbPut('todos',obj);fbPush('todos',obj);
    render();openDay(obj.date);
    return;
  }
  const deEl=$('#td-de');
  const endDate=(deEl&&deEl.value)||startDate;
  let cur=new Date(startDate+'T00:00:00');const end=new Date(endDate+'T00:00:00');
  const dates=[];
  if(isNaN(cur)||isNaN(end)||end<cur){dates.push(startDate);}
  else{while(cur<=end){dates.push(cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0'));cur.setDate(cur.getDate()+1);}}
  for(const d of dates){
    const obj={id:'TD'+uid(),date:d,title,note,done:false};
    await dbPut('todos',obj);S.todos.push(obj);fbPush('todos',obj);
  }
  render();openDay(dates[0]);
  if(dates.length>1)toast(`${dates.length}일 간 할 일이 추가됐어요`);
}
async function toggleTodo(id,reopen){

  render();

}
async function delTodo(id,date){

  await dbDel('todos',id);S.todos=S.todos.filter(x=>x.id!==id);fbRemove('todos',id);

/* 전압선 판정: 수동(voltLine) 우선 → voltage/그룹/분류 자동판정 */
function voltLine(e){
  if(e.voltLine)return e.voltLine;
  const v=parseFloat(e.voltage);
  if(!isNaN(v)){
    if(v>=20000)return '22.9kV'; if(v>=6000&&v<12000)return '6.9kV'; if(v>=380&&v<=600)return '460V'; if(v>=100&&v<250)return '제어(110V)';
    if(v>=20)return '22.9kV'; if(v>=6&&v<12)return '6.9kV'; if(v>=0.3&&v<1)return '460V'; if(v>=0.1&&v<=0.25)return '제어(110V)';
  }
  const t=((e.group||'')+' '+(e.name||'')+' '+(e.category||'')).toUpperCase();
  if(/22\.9|수전|INCOMING|특고/.test(t))return '22.9kV';
  if(/6\.9|6\.6|6900|6600|SWGR|SWITCHGEAR/.test(t))return '6.9kV';
  if(/460|380|MCC|LOAD CENTER|저압|LC-/.test(t))return '460V';
  if(/110V|제어|CONTROL|DC110/.test(t))return '제어(110V)';
  return '미분류';
}
const VOLT_LINES=['22.9kV','6.9kV','460V','제어(110V)','기타','미분류'];
function equipTreeHtml(){
  const plants=['PB','DH','태양광'];
  const out=plants.map(p=>{
    const inP=S.equipment.filter(e=>e.plant===p);
    if(!inP.length)return '';
    const vparts=VOLT_LINES.map(vl=>{
      const inV=inP.filter(e=>voltLine(e)===vl);
      if(!inV.length)return '';
      const groups=[...new Set(inV.map(e=>e.group||'(그룹 미지정)'))].sort();
      const gparts=groups.map(g=>{
        const inG=inV.filter(e=>(e.group||'(그룹 미지정)')===g);
        const rows=inG.map(e=>`<div class="item click l4" onclick="openEquip('${e.id}')">
          <div class="t"><div class="n">${esc(e.name)}</div><div class="d">${esc(e.tagNo||'')}${e.voltage?' · '+esc(e.voltage)+'kV':''}</div></div>
          ${(e.docRefs&&e.docRefs.length)?`<span class="badge b-green">도면 ${e.docRefs.length}</span>`:''}</div>`).join('');
        return `<details class="tnode l3"><summary>${esc(g)} <span class="cnt">${inG.length}</span></summary>${rows}</details>`;
      }).join('');
      return `<details class="tnode l2"><summary>${vl} <span class="cnt">${inV.length}</span></summary>${gparts}</details>`;
    }).join('');
    return `<details class="tnode"><summary>${p} <span class="cnt">${inP.length}</span></summary>${vparts}</details>`;
  }).join('');
  return out||'<div class="empty">설비 없음 — 더보기에서 초기 데이터(seed)를 먼저 가져오세요</div>';
}

/* ================= PART 6.5 : 계통 트리 & 차단범위 (모듈②) ================= */
const NODE_TYPES={source:['🔺','전원(인입)'],bus:['🔌','모선/판넬'],breaker:['⚡','차단기'],load:['⚙️','부하설비']};
const nodeById=id=>S.tree.find(n=>n.id===id);
const nodeKids=id=>S.tree.filter(n=>n.parentId===id);
/* 전압탭 분리(v44): 트리 노드의 전압등급 문자열 → 표준 구간으로 분류, 없으면 상위 노드에서 상속 */
const TREE_VOLT_TABS=['전체','22.9kV','6.9kV','460V','제어(110V)'];
function nodeVoltClass(raw){
  const t=(raw||'').toUpperCase();if(!t)return '';
  if(/22\.9|수전|INCOMING|특고/.test(t))return '22.9kV';
  if(/6\.9|6\.6|6900|6600|SWGR|SWITCHGEAR/.test(t))return '6.9kV';
  if(/460|380|220|저압/.test(t))return '460V';
  if(/110|제어/.test(t))return '제어(110V)';
  return '기타';
}
function effVolt(node,guard){
  guard=guard||0;if(!node||guard>60)return '';
  const own=nodeVoltClass(node.voltage);if(own)return own;
  if(node.parentId){const p=nodeById(node.parentId);if(p)return effVolt(p,guard+1);}
  return '';
}
// 특정 전압탭에서 "루트"가 되는 노드들: 이 탭에 속하면서, 부모가 없거나 부모는 다른 탭인 노드(=구간 시작점)
function treeRootsForTab(tab){
  if(!tab||tab==='전체')return S.tree.filter(n=>!n.parentId);
  return S.tree.filter(n=>{
    if(effVolt(n)!==tab)return false;
    if(!n.parentId)return true;
    const p=nodeById(n.parentId);
    return !p||effVolt(p)!==tab;
  });
}
// 상위 방향 경로 (leaf → root)
function pathUp(id){
  const out=[];let n=nodeById(id),guard=0;
  while(n&&guard++<50){out.push(n);n=n.parentId?nodeById(n.parentId):null}
  return out;
}
// 조회 A: 차단 경로 문자열 (부하 ← 차단기 ← ... ← 전원)
function blockPathText(id){
  return pathUp(id).map(n=>n.type==='breaker'?`<b>${esc(n.name)}</b>`:esc(n.name)).join(' ← ');
}
function blockPathPlain(id){
  return pathUp(id).map(n=>n.name).join(' ← ');
}
// 차단경로 시각 트리(SVG) — 전원(위) → 부하(아래), 차단기 강조
function blockPathSvg(id){
  const path=pathUp(id).slice().reverse();
  if(path.length<1)return '';
  const bw=250,bh=36,gap=20,pad=8,cx=pad+bw/2;
  const totalH=pad*2+path.length*bh+(path.length-1)*gap;
  let svg='';
  path.forEach((n,i)=>{const y=pad+i*(bh+gap);
    if(i<path.length-1)svg+=`<line x1="${cx}" y1="${y+bh}" x2="${cx}" y2="${y+bh+gap}" stroke="var(--line)" stroke-width="2"/>`;});
  path.forEach((n,i)=>{const y=pad+i*(bh+gap);const isBrk=n.type==='breaker';
    svg+=`<rect x="${pad}" y="${y}" width="${bw}" height="${bh}" rx="9" fill="var(--panel2)" stroke="${isBrk?'var(--danger)':'var(--line)'}" stroke-width="${isBrk?2.5:1}"/>`;
    svg+=`<text x="${pad+12}" y="${y+bh/2+4}" font-size="12" fill="var(--txt)">${esc((n.name||'').slice(0,24))}</text>`;
    if(isBrk)svg+=`<text x="${pad+bw-10}" y="${y+bh/2+4}" font-size="9" fill="var(--danger)" text-anchor="end">⚡차단</text>`;});
  return `<div style="overflow-x:auto;margin:6px 0"><svg viewBox="0 0 ${bw+pad*2} ${totalH}" style="height:auto;min-width:${bw+pad*2}px;max-width:100%">${svg}</svg></div>`;
}
// 조회 B: 하위 전체 (정전 영향 범위)
function descendants(id){
  const out=[],stack=[id];let guard=0;
  while(stack.length&&guard++<2000){
    const cur=stack.pop();
    for(const k of nodeKids(cur)){out.push(k);stack.push(k.id)}
  }
  return out;
}
function vTree(){
  const allRoots=S.tree.filter(n=>!n.parentId);
  const tab=S._treeVoltTab||'전체';
  const roots=treeRootsForTab(tab);
  return `
  <div class="card"><h2>🔌 전원계통 트리 <span class="cnt">${S.tree.length}노드</span></h2>
    ${allRoots.length?`
    <div class="row" style="gap:6px;margin-bottom:8px;flex-wrap:wrap">
      ${TREE_VOLT_TABS.map(t=>`<button class="btn ${tab===t?'':'ghost'} sm" onclick="treeVoltTab('${t}')">${esc(t)}</button>`).join('')}
    </div>
    <div class="row" style="gap:6px;margin-bottom:6px">
      <input id="tree-find" placeholder="이름·번호로 찾기 (예: VCB-504)" style="flex:1" onkeydown="if(event.key==='Enter')findTreeNode()">
      <button class="btn sm" onclick="findTreeNode()">찾기</button>
    </div>
    <div class="row" style="gap:6px;margin-bottom:8px;flex-wrap:wrap">
      <button class="btn ghost sm" onclick="treeZoom(-0.15)">－</button>
      <div class="muted" style="min-width:44px;text-align:center;align-self:center">${Math.round((S._treeZoom||1)*100)}%</div>
      <button class="btn ghost sm" onclick="treeZoom(0.15)">＋</button>
      <button class="btn ghost sm" onclick="S._treeZoom=1;render()">100%</button>
      <div class="grow"></div>
      <button class="btn ghost sm" onclick="expandAllTree()">전체 펼치기</button>
      <button class="btn ghost sm" onclick="collapseAllTree()">기본 보기</button>
    </div>`:''}
    ${!allRoots.length?'<div class="empty">아직 입력된 계통이 없습니다.<br><br>이 트리는 <b>차단범위(LOTO) 계산용</b>이라 도면에서 자동 생성되지 않고,<br>단선도를 보며 직접 입력합니다 — 입력 과정 자체가 계통 학습입니다(주 1~2개 피더).<br>예: 22.9kV 수전 → 6.9kV F-05 VCB → BOILER동 MCC → MCCB #12 → 모터<br><br><button class="btn ghost sm" onclick="go(\'docfind\')">📐 도면 탭에서 단선도 보며 입력 시작</button></div>'
      :(roots.length?roots.map(r=>treeSvg(r,tab)).join(''):`<div class="empty">'${esc(tab)}' 구간에 해당하는 노드가 없습니다.<br>노드 수정에서 전압등급을 '${esc(tab)}'(또는 관련 표기)로 지정하면 이 탭에 나타납니다.</div>`)}
    <button class="btn ghost sm full" onclick="editNode('','')">+ 최상위(인입 전원) 추가</button>

  </div>

// 전원계통 트리를 박스+연결선 SVG 다이어그램으로 렌더 (누가 봐도 알아보는 조직도 형태)
// 이름은 박스 안에서 짧게 줄이고, 박스를 탭하면 nodeMenu가 전체 이름·차단경로를 보여줌
function collectSubtree(root,tab){
  const out=[root];const stack=[root];
  while(stack.length){
    const cur=stack.pop();
    if(isTreeCollapsed(cur))continue;
    if(tab&&tab!=='전체'&&cur.id!==root.id&&effVolt(cur)!==tab)continue;
    for(const k of nodeKids(cur.id)){out.push(k);stack.push(k);}
  }
  return out;
}
function treeSvg(root,tab){
  const boxW=116,boxH=44,hGap=14,vGap=34,pad=16;
  const positions={};let leafCounter=0;
  function walk(node,depth){
    const boundary=tab&&tab!=='전체'&&node.id!==root.id&&effVolt(node)!==tab;
    const kids=(isTreeCollapsed(node)||boundary)?[]:nodeKids(node.id);
    if(!kids.length){positions[node.id]={slot:leafCounter,depth};leafCounter++;return positions[node.id].slot;}
    const slots=kids.map(k=>walk(k,depth+1));
    const slot=(Math.min(...slots)+Math.max(...slots))/2;
    positions[node.id]={slot,depth};
    return slot;
  }
  walk(root,0);
  const nodes=collectSubtree(root,tab);
  const maxDepth=Math.max(...nodes.map(n=>positions[n.id].depth));
  const slotW=boxW+hGap;
  const px=id=>pad+positions[id].slot*slotW+boxW/2;
  const py=id=>pad+positions[id].depth*(boxH+vGap);
  const totalW=pad*2+Math.max(leafCounter,1)*boxW+Math.max(leafCounter-1,0)*hGap;
  const totalH=pad*2+(maxDepth+1)*boxH+maxDepth*vGap;
  let edges='';
  nodes.forEach(n=>{
    if(isTreeCollapsed(n))return;
    if(tab&&tab!=='전체'&&n.id!==root.id&&effVolt(n)!==tab)return;
    const kids=nodeKids(n.id);if(!kids.length)return;
    const x0=px(n.id),yBottom=py(n.id)+boxH,busY=yBottom+vGap/2;
    const childXs=kids.map(k=>px(k.id));
    edges+=`<line x1="${x0}" y1="${yBottom}" x2="${x0}" y2="${busY}" stroke="var(--line)" stroke-width="2"/>`;
    if(kids.length>1)edges+=`<line x1="${Math.min(...childXs)}" y1="${busY}" x2="${Math.max(...childXs)}" y2="${busY}" stroke="var(--line)" stroke-width="2"/>`;
    kids.forEach(k=>{const cx=px(k.id);edges+=`<line x1="${cx}" y1="${busY}" x2="${cx}" y2="${py(k.id)}" stroke="var(--line)" stroke-width="2"/>`;});
  });
  let boxes='';
  nodes.forEach(n=>{
    const x=px(n.id)-boxW/2,y=py(n.id);
    const isBrk=n.type==='breaker';
    const [ic]=NODE_TYPES[n.type]||['·'];
    const full=n.name||'';
    const label=full.length>12?full.slice(0,11)+'…':full;
    const kidsAll=nodeKids(n.id);
    const boundary=tab&&tab!=='전체'&&n.id!==root.id&&effVolt(n)!==tab;
    const collapsed=!boundary&&kidsAll.length&&isTreeCollapsed(n);
    const highlighted=n.id===S._treeHighlight;
    const nextTab=boundary?effVolt(n):'';
    boxes+=`<g id="tn-${n.id}">
      <g onclick="nodeMenu('${n.id}')" style="cursor:pointer">
        <rect x="${x}" y="${y}" width="${boxW}" height="${boxH}" rx="10" fill="var(--panel2)" stroke="${highlighted?'var(--warn)':(boundary?'var(--dim)':(isBrk?'var(--danger)':'var(--accent)'))}" stroke-width="${highlighted?3:(boundary?1.4:(isBrk?2.5:1.4))}" stroke-dasharray="${boundary?'4,3':'0'}"/>
        <text x="${x+boxW/2}" y="${y+18}" font-size="12" text-anchor="middle" fill="var(--txt)">${ic} ${esc(label)}</text>
        ${(n.voltage&&!boundary)?`<text x="${x+boxW/2}" y="${y+31}" font-size="9.5" text-anchor="middle" fill="var(--dim)">${esc(n.voltage)}</text>`:''}
        ${n.equipId?`<circle cx="${x+boxW-8}" cy="${y+8}" r="3.5" fill="var(--accent)"/>`:''}
      </g>
      ${boundary?`<g onclick="event.stopPropagation();jumpToVoltTab('${n.id}')" style="cursor:pointer">
        <rect x="${x}" y="${y+boxH-15}" width="${boxW}" height="15" rx="7" fill="var(--panel)" stroke="var(--accent)" stroke-width="1"/>
        <text x="${x+boxW/2}" y="${y+boxH-4}" font-size="9" text-anchor="middle" fill="var(--accent)">▶ ${esc(nextTab||'다음')} 보기</text>
      </g>`:(kidsAll.length?`<g onclick="event.stopPropagation();toggleTreeNode('${n.id}')" style="cursor:pointer">
        <circle cx="${x+11}" cy="${y+boxH-11}" r="9" fill="var(--panel)" stroke="var(--accent)" stroke-width="1.2"/>
        <text x="${x+11}" y="${y+boxH-7}" font-size="12" text-anchor="middle" fill="var(--accent)">${collapsed?'+':'–'}</text>
      </g>`:'')}
    </g>`;
  });
  const zoom=S._treeZoom||1;
  return `<div style="overflow:auto;margin:8px 0;max-height:62vh"><svg viewBox="0 0 ${totalW} ${totalH}" style="width:${Math.round(totalW*zoom)}px;height:${Math.round(totalH*zoom)}px;max-width:none">${edges}${boxes}</svg></div>`;
}

    <div class="muted">${NODE_TYPES[n.type][1]} ${n.voltage?'· '+esc(n.voltage):''} ${e?'· '+esc(e.name):''}</div>

/* LOTO 체크리스트 — 산안법 안전보건규칙 §318~320 정전작업 절차 */
function startLoto(nodeId){
  const n=nodeById(nodeId);if(!n)return;
  const brks=pathUp(nodeId).filter(x=>x.type==='breaker');
  const steps=[];
  for(const b of brks){
    steps.push({label:`① 차단: ${b.name} 개방`,done:false});
    steps.push({label:`② 잠금·표지: ${b.name} 시건장치 및 꼬리표 부착`,done:false});
  }
  steps.push({label:'③ 검전: 작업 부위 검전기로 무전압 확인',done:false});
  steps.push({label:'④ 잔류전하 방전 (콘덴서·케이블)',done:false});
  steps.push({label:'⑤ 접지: 단락접지기구 설치',done:false});
  steps.push({label:'⑥ 작업 구역 표지 설치 후 작업 개시',done:false});
  S._loto={id:'L'+uid(),date:todayStr(),target:n.name,nodeId,steps};
  renderLoto();
}
function renderLoto(){
  const l=S._loto;if(!l)return;
  const done=l.steps.filter(s=>s.done).length;
  openModal(`<h3>🔒 LOTO — ${esc(l.target)}</h3>
    <div class="muted">${esc(l.date)} · ${done}/${l.steps.length} 완료 · 근거: 산업안전보건기준에 관한 규칙 §318~320 (원문은 law.go.kr 확인)</div>
    <div class="path-box">${blockPathText(l.nodeId)}</div>
    ${l.steps.map((s,i)=>`<div class="loto-step">
      <div class="chk ${s.done?'done':''}" onclick="S._loto.steps[${i}].done=!S._loto.steps[${i}].done;renderLoto()">✓</div>
      <div style="font-size:14px;${s.done?'color:var(--dim);text-decoration:line-through':''}">${esc(s.label)}</div>
    </div>`).join('')}
    <div class="row" style="margin-top:14px">
      <div class="grow"></div>
      <button class="btn ghost sm" onclick="S._loto=null;closeModal()">취소</button>
      <button class="btn sm" onclick="saveLoto()">시행 기록 저장</button>
    </div>`);
}
async function saveLoto(){
  const l=S._loto;if(!l)return;

async function uploadDrawing(equipId,type){

  inp.onchange=()=>{
    const f=inp.files[0];if(!f)return;
    if(f.size>8*1024*1024){toast('8MB 이하 이미지로 축소 후 업로드하세요');return}
    const rd=new FileReader();
    rd.onload=async()=>{
      const d={id:'D'+uid(),equipId,type,name:f.name,dataUrl:rd.result,added:todayStr()};
      await dbPut('drawings',d);S.drawings.push(d);
      toast(`${type} 저장 (이 기기에만 보관)`);openEquip(equipId);
    };
    rd.readAsDataURL(f);
  };
  inp.click();
}
async function delDrawing(id,equipId){
  if(!(await confirmModal('이 도면을 삭제할까요?')))return;
  await dbDel('drawings',id);S.drawings=S.drawings.filter(d=>d.id!==id);
  openEquip(equipId);
}
/* 핀치줌 + 휠줌 + 드래그 뷰어 */
function viewDrawing(id){
  const d=S.drawings.find(x=>x.id===id);if(!d)return;
  const v=document.createElement('div');v.className='viewer';
  v.innerHTML=`<div class="vbar">
      <span class="grow" style="font-size:13px">${esc(d.type)} · ${esc(d.name)}</span>
      <button class="btn ghost sm" id="vz-out">−</button><button class="btn ghost sm" id="vz-in">＋</button>
      <button class="btn sm" id="vz-x">닫기</button></div>
    <div class="vwrap"><img src="${d.dataUrl}" draggable="false"></div>`;
  document.body.appendChild(v);
  const img=v.querySelector('img'),wrap=v.querySelector('.vwrap');
  let sc=1,tx=0,ty=0;
  const apply=()=>img.style.transform=`translate(${tx}px,${ty}px) scale(${sc})`;
  img.onload=()=>{sc=Math.min(wrap.clientWidth/img.naturalWidth,wrap.clientHeight/img.naturalHeight,1);tx=(wrap.clientWidth-img.naturalWidth*sc)/2;ty=20;apply()};
  const zoom=(f,cx,cy)=>{const ns=Math.min(Math.max(sc*f,.1),12);tx=cx-(cx-tx)*ns/sc;ty=cy-(cy-ty)*ns/sc;sc=ns;apply()};
  v.querySelector('#vz-in').onclick=()=>zoom(1.4,wrap.clientWidth/2,wrap.clientHeight/2);
  v.querySelector('#vz-out').onclick=()=>zoom(1/1.4,wrap.clientWidth/2,wrap.clientHeight/2);
  v.querySelector('#vz-x').onclick=()=>v.remove();
  wrap.addEventListener('wheel',e=>{e.preventDefault();zoom(e.deltaY<0?1.15:1/1.15,e.offsetX,e.offsetY)},{passive:false});
  const pts=new Map();let lastDist=0;
  wrap.addEventListener('pointerdown',e=>{pts.set(e.pointerId,{x:e.clientX,y:e.clientY});wrap.setPointerCapture(e.pointerId)});
  wrap.addEventListener('pointermove',e=>{
    if(!pts.has(e.pointerId))return;
    const prev=pts.get(e.pointerId);
    pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(pts.size===1){tx+=e.clientX-prev.x;ty+=e.clientY-prev.y;apply()}
    else if(pts.size===2){
      const[a,b]=[...pts.values()];
      const dist=Math.hypot(a.x-b.x,a.y-b.y);
      if(lastDist){const r=wrap.getBoundingClientRect();zoom(dist/lastDist,(a.x+b.x)/2-r.left,(a.y+b.y)/2-r.top)}
      lastDist=dist;

function vChk(){

        const done=isChkDone(c);

          <div class="t"><div class="n" style="${done?'text-decoration:line-through;color:var(--dim)':''}">${esc(c.name)}</div>

/* ===== 법령 내비게이터 화면 (검색·분류) ===== */
function lawFiltered(){
  const q=(S._lawQ||'').toLowerCase().trim();const cat=S._lawCat||'';
  let list=S.laws.slice();
  if(cat)list=list.filter(l=>(l.cat||'기타')===cat);
  if(q)list=list.filter(l=>((l.title||'')+' '+(l.article||'')+' '+(l.summary||'')+' '+(l.cat||'')).toLowerCase().includes(q));
  return list;
}
function lawResults(){
  const list=lawFiltered();const q=(S._lawQ||'').trim();
  if(!list.length)return `<div class="empty">일치하는 조문 없음 — 다른 키워드로 검색해 보세요</div>`;
  return `<div class="muted" style="margin-bottom:6px">${list.length}건${q?' · "'+esc(q)+'" 검색결과':''}</div>`+
    list.map(l=>`<div class="item click" onclick="openLaw('${l.id}')">
      <div class="t"><div class="n">${esc(l.title)}</div><div class="d">${esc(l.article||'')}${l.cat?' · '+esc(l.cat):''}</div></div>
      <span class="badge b-blue">요약</span></div>`).join('');
}
function lawSearch(v){S._lawQ=v;const el=document.getElementById('lawlist');if(el)el.innerHTML=lawResults();}
function vLaw(){
  const cat=S._lawCat||'';
  const cats=[...new Set(S.laws.map(l=>l.cat||'기타'))];
  const order=c=>{const i=LAW_CATS.indexOf(c);return i<0?99:i;};
  cats.sort((a,b)=>order(a)-order(b)||a.localeCompare(b));
  if(!S.laws.length)return `<div class="card"><h2>📖 법령 내비게이터</h2>
    <div class="empty">법령 카드 없음 — 내장 라이브러리를 넣으세요</div>
    <button class="btn full" onclick="seedLaws()">📚 내장 법령 라이브러리 넣기 (30개)</button>
    <button class="btn ghost sm full" onclick="go('more')">← 더보기</button></div><div class="botpad"></div>`;
  return `
  <div class="searchwrap"><input placeholder="상황·궁금한 점 검색 (예: 케이블 교체, 정전작업, 접지, 승강기)" value="${esc(S._lawQ||'')}" oninput="lawSearch(this.value)"></div>
  <div class="muted" style="margin:-4px 2px 8px">💡 궁금한 작업/상황을 입력하면 참조할 조문이 담긴 카드를 찾아줍니다.</div>
  <div class="chips">
    <button class="chip ${!cat?'on':''}" onclick="S._lawCat='';render()">전체 ${S.laws.length}</button>
    ${cats.map(c=>`<button class="chip ${cat===c?'on':''}" onclick="S._lawCat='${esc(c)}';render()">${esc(c)}</button>`).join('')}
  </div>
  <div class="card" id="lawlist">${lawResults()}</div>
  <div class="row"><button class="btn ghost sm" onclick="editLaw()">+ 카드 추가</button>
    <button class="btn ghost sm" onclick="seedLaws()">라이브러리 갱신</button>
    <div class="grow"></div><button class="btn ghost sm" onclick="go('more')">← 더보기</button></div>
  <div class="section-note">요약은 참고용 — 검사·용역·작업 전 각 카드의 law.go.kr 원문에서 개정·수치 확인. 상황 검색은 키워드 매칭이며, 상세 해석은 설비 카드의 AI 진단(외부 AI 복사)을 활용하세요.</div>
  <div class="botpad"></div>`;
}
async function wipeAll(){
  if(!(await confirmModal('이 기기의 모든 앱 데이터를 삭제합니다. 백업 하셨나요?')))return;
  if(!(await confirmModal('정말 삭제할까요? 되돌릴 수 없습니다.')))return;
  for(const s of STORES)await dbClear(s);
  await loadAll();render();toast('전체 삭제 완료');
}

/* ================= PART 9.5 : 법령 카드 (Phase 3 공간 — laws 스토어) ================= */
function openLaw(id){
  const l=S.laws.find(x=>x.id===id);if(!l)return;
  openModal(`<h3>${esc(l.title)}</h3>
    <div class="muted">${l.cat?`<span class="badge b-blue">${esc(l.cat)}</span> `:''}${esc(l.article||'')}</div>
    <div class="path-box" style="white-space:pre-wrap">${esc(l.summary||'')}</div>
    ${l.link?`<a href="${esc(l.link)}" target="_blank" rel="noopener" class="btn ghost sm full" style="display:block;text-align:center;text-decoration:none;line-height:1.8">📜 국가법령정보센터 원문 (개정 여부 확인)</a>`:''}
    <div class="row" style="margin-top:12px">
      <button class="btn danger sm" onclick="delLaw('${l.id}')">삭제</button>
      <div class="grow"></div>
      <button class="btn ghost sm" onclick="editLaw('${l.id}')">수정</button>
      <button class="btn sm" onclick="closeModal()">닫기</button></div>`);
}
function editLaw(id){
  const l=id?S.laws.find(x=>x.id===id):null;
  openModal(`<h3>${l?'법령 카드 수정':'법령 카드 추가'}</h3>
    <label>분류</label><input id="lw-c" value="${esc(l?.cat||'')}" placeholder="예: 산업안전보건법 / 전기안전관리법 / KEC">
    <label>제목 * (내 업무 기준)</label><input id="lw-t" value="${esc(l?.title||'')}" placeholder="예: 정전작업 절차">
    <label>근거 조문</label><input id="lw-a" value="${esc(l?.article||'')}" placeholder="예: 산업안전보건기준에 관한 규칙 §318~320">
    <label>요약</label><textarea id="lw-s" rows="5">${esc(l?.summary||'')}</textarea>
    <label>원문 링크 (law.go.kr)</label><input id="lw-l" value="${esc(l?.link||'')}">
    <div class="row" style="margin-top:14px"><div class="grow"></div>
      <button class="btn ghost sm" onclick="closeModal()">취소</button>
      <button class="btn sm" onclick="saveLaw('${l?.id||''}')">저장</button></div>`);
}
async function saveLaw(id){
  const t=$('#lw-t').value.trim();if(!t){toast('제목을 입력하세요');return}
  const obj=id?S.laws.find(x=>x.id===id):{id:'LW'+uid()};
  Object.assign(obj,{cat:$('#lw-c').value.trim(),title:t,article:$('#lw-a').value.trim(),summary:$('#lw-s').value.trim(),link:$('#lw-l').value.trim()});
  await dbPut('laws',obj);
  if(!id)S.laws.push(obj);
  closeModal();render();
}
async function delLaw(id){
  if(!(await confirmModal('이 카드를 삭제할까요?')))return;
  await dbDel('laws',id);S.laws=S.laws.filter(x=>x.id!==id);
  closeModal();render();
}
/* 카테고리별 그룹 렌더링 (더보기 화면) */
const LAW_CATS=['전기안전관리법','산업안전보건법','항공안전법','승강기 안전관리법','KEC·기술기준'];
function lawListHtml(){
  if(!S.laws.length)return '<div class="empty">법령 카드 없음 — 아래 라이브러리 버튼으로 30개 주입</div>';
  const cats=[...new Set(S.laws.map(l=>l.cat||'기타'))];
  const order=c=>{const i=LAW_CATS.indexOf(c);return i<0?99:i;};
  cats.sort((a,b)=>order(a)-order(b)||a.localeCompare(b));
  return cats.map(c=>{
    const items=S.laws.filter(l=>(l.cat||'기타')===c);
    return `<div class="law-grp"><div class="law-cat">${esc(c)} <span class="cnt">${items.length}</span></div>`+
      items.map(l=>`<div class="item click" onclick="openLaw('${l.id}')">
        <div class="t"><div class="n">${esc(l.title)}</div><div class="d">${esc(l.article||'')}</div></div>
        <span class="badge b-blue">요약</span></div>`).join('')+`</div>`;
  }).join('');
}

/* ================= PART 9.6 : 안전 서류함 + 보고서 생성기 (모듈⑧·⑦ a방식) ================= */
/* 공통: 생성된 정리 텍스트를 모달에 띄우고 복사/다운로드. hwpx 스킬에 붙여넣어 공문화. */
function openDoc(title,text){
  window._docText=text;
  openModal(`<h3>${esc(title)}</h3>
    <textarea id="doc-out" rows="14" style="font-family:monospace;font-size:12px" readonly>${esc(text)}</textarea>
    <div class="section-note">📋 복사 → Claude에 hwpx 스킬(new-hwpx-master 등)과 함께 붙여넣으면 공문/기안문으로 완성됩니다.</div>
    <div class="row" style="margin-top:10px">
      <button class="btn danger sm" onclick="downloadDoc('${esc(title)}')">⬇ .txt 저장</button>
      <div class="grow"></div>
      <button class="btn sm" onclick="copyDoc()">📋 복사</button>
      <button class="btn ghost sm" onclick="closeModal()">닫기</button></div>`);
}
function copyDoc(){navigator.clipboard.writeText(window._docText||'').then(()=>toast('복사됨 — hwpx 스킬에 붙여넣기'),()=>toast('복사 실패'));}
function downloadDoc(title){
  const blob=new Blob([window._docText||''],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=(title.replace(/[^\w가-힣()]+/g,'_'))+'_'+todayStr()+'.txt';
  document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
/* 선택 리스트 모달 헬퍼 */
function pickModal(title,rows,empty){
  openModal(`<h3>${esc(title)}</h3>${rows||`<div class="empty">${esc(empty||'데이터 없음')}</div>`}
    <div class="row" style="margin-top:10px"><div class="grow"></div><button class="btn ghost sm" onclick="closeModal()">닫기</button></div>`);
}

function matchFaultModes(sym,cat){
  const q=(sym||'').toLowerCase();
  const scored=FAULTMODE_LIB.map(m=>{
    let sc=0;
    if(cat&&m.cat&&(cat.includes(m.cat)||m.cat.includes(cat)))sc+=2;
    for(const k of m.sym){if(q.includes(k.toLowerCase()))sc+=2;}
    if(q&&(m.name.toLowerCase().includes(q)))sc+=1;
    return {m,sc};
  }).filter(x=>x.sc>0).sort((a,b)=>b.sc-a.sc);
  return scored.map(x=>x.m).slice(0,6);
}

function similarFaults(text,excludeId){
  const q=(text||'').toLowerCase().trim();if(!q)return [];
  const words=[...new Set(q.split(/[\s,·\/()]+/).filter(w=>w.length>=2))];
  return S.faults.filter(f=>f.id!==excludeId&&f.content).map(f=>{
    const hay=((f.content||'')+' '+(f.cause||'')+' '+(f.action||'')+' '+(f.equipName||'')).toLowerCase();
    let sc=0;for(const w of words){if(hay.includes(w))sc++;}
    if(hay.includes(q))sc+=3;
    return {f,sc};
  }).filter(x=>x.sc>0).sort((a,b)=>b.sc-a.sc||(b.f.date||'').localeCompare(a.f.date||'')).slice(0,6).map(x=>x.f);
}

/* 회사 hwpx 양식에 {{토큰}}을 넣어 등록 → 앱 데이터로 치환 → 재압축 다운로드.
   양식(section0.xml)의 텍스트 런(<hp:t>)이 토큰을 쪼갤 수 있어 문단 단위로 병합 후 치환. */
const HWPX_TOKENS=['년월','작성일','작성자','부서','개요','점검결과','정비실적','차월계획','특이사항'];
function loadJSZip(){
  if(window.JSZip)return Promise.resolve(window.JSZip);
  return new Promise((res,rej)=>{
    const sc=document.createElement('script');
    sc.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
    sc.onload=()=>window.JSZip?res(window.JSZip):rej(new Error('JSZip 초기화 실패'));
    sc.onerror=()=>rej(new Error('JSZip 로드 실패 — 인터넷 연결 필요(오프라인이면 a방식 사용)'));
    document.head.appendChild(sc);
  });
}

function hwpxTokenGuide(){
  const t=`[hwpx 양식에 넣을 토큰]
한글에서 회사 양식을 열고, 값이 들어갈 자리에 아래 토큰을 그대로 입력한 뒤 저장·등록하세요.

{{년월}}      예: 2026년 7월
{{작성일}}    오늘 날짜 자동
{{작성자}}    허남원

{{특이사항}}  현안/협조사항

주의: 한 토큰은 한 줄(한 셀) 안에 끊기지 않게 입력. 여러 줄 값은 ' / '로 이어 한 줄에 표시됩니다.`;
  openDoc('hwpx 토큰 안내',t);
}
const _escXml=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function replaceHwpxTokens(xml,tokens){
  const sub=str=>str.replace(/\{\{\s*([^}]+?)\s*\}\}/g,(m,k)=>tokens[k]!=null?tokens[k]:m);
  try{
    const doc=new DOMParser().parseFromString(xml,'application/xml');
    if(doc.getElementsByTagName('parsererror').length)throw new Error('parse');
    const all=doc.getElementsByTagName('*');const ps=[];
    for(let i=0;i<all.length;i++)if(all[i].localName==='p')ps.push(all[i]);
    let hit=0;
    for(const p of ps){
      const kids=p.getElementsByTagName('*');const ts=[];
      for(let i=0;i<kids.length;i++)if(kids[i].localName==='t')ts.push(kids[i]);
      if(!ts.length)continue;
      const full=ts.map(t=>t.textContent).join('');
      if(!/\{\{[^}]+\}\}/.test(full))continue;
      const nf=sub(full);
      if(nf!==full){ts[0].textContent=nf;for(let i=1;i<ts.length;i++)ts[i].textContent='';hit++;}
    }
    if(!hit) return xml.indexOf('{{')>=0 ? sub(xml) : new XMLSerializer().serializeToString(doc);
    return new XMLSerializer().serializeToString(doc);
  }catch(e){
    // fallback: 단순 문자열 치환(값은 XML escape)
    const esc={};for(const k in tokens)esc[k]=_escXml(tokens[k]);
    return xml.replace(/\{\{\s*([^}]+?)\s*\}\}/g,(m,k)=>esc[k]!=null?esc[k]:m);
  }
}
function buildMonthlyTokens(){
  const now=new Date();const y=now.getFullYear(),m=now.getMonth()+1;
  const ym=y+'-'+String(m).padStart(2,'0');
  const inM=d=>(d||'').startsWith(ym);
  const chk=S.checklogs.filter(l=>inM(l.date)).map(l=>l.name);
  const flt=S.faults.filter(f=>inM(f.date)).map(f=>`${f.equipName||''} ${f.content||''}${f.action?'→'+f.action:''}`.trim());
  const insp=[...S.inspections].map(i=>({...i,dd:dday(i.nextDue)})).filter(i=>i.dd!=null&&i.dd<=60)
    .sort((a,b)=>a.dd-b.dd).map(i=>`${i.name}(${i.nextDue},D-${i.dd})`);
  const iss=(S.issues||[]).map(x=>x.title||x.name||x.content).filter(Boolean);
  const join=(a,def)=>a.length?a.join(' / '):def;
  return {
    '년월':`${y}년 ${m}월`,'작성일':todayStr(),'작성자':'허남원','부서':'전력계통과',
    '개요':`CFBC 보일러 전기설비 ${y}년 ${m}월 정기 점검·정비 결과 요약`,
    '점검결과':join(chk,'주기 점검 실시, 이상 없음'),
    '정비실적':join(flt,'특이 정비사항 없음'),
    '차월계획':join(insp,'해당 없음'),
    '특이사항':join(iss,'특이 이상징후 없음')
  };
}
async function genHwpxMonthly(){
  const tpl=S._hwpxTpl||await dbGet('meta','hwpxTpl');
  if(!tpl){toast('먼저 hwpx 템플릿을 등록하세요');return;}
  let JSZip;try{JSZip=await loadJSZip();}catch(e){toast(e.message);return;}
  try{
    const zip=await JSZip.loadAsync(tpl.data);
    const secName=Object.keys(zip.files).find(n=>/Contents\/section0\.xml$/i.test(n))||'Contents/section0.xml';
    const secFile=zip.file(secName);
    if(!secFile){toast('section0.xml 을 찾지 못함 — hwpx 구조 확인');return;}
    let xml=await secFile.async('string');
    if(xml.indexOf('{{')<0){toast('양식에 {{토큰}}이 없습니다. [토큰 안내]대로 양식에 입력 후 다시 등록하세요');return;}
    xml=replaceHwpxTokens(xml,buildMonthlyTokens());
    zip.file(secName,xml);
    // mimetype은 무압축(STORE)으로 유지
    if(zip.file('mimetype')){const mt=await zip.file('mimetype').async('uint8array');zip.file('mimetype',mt,{compression:'STORE'});}
    const blob=await zip.generateAsync({type:'blob',mimeType:'application/hwp+zip',compression:'DEFLATE'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='월간점검정비보고_'+todayStr()+'.hwpx';document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href),1500);
    toast('hwpx 생성 완료 — 한글에서 열어 확인하세요');
  }catch(e){toast('생성 오류: '+e.message);}
}

/* ================= PART 9.9 : 도면 문서함 (모듈③ — 반·계통 단위 라이브러리) ================= */
/* 도면은 설비가 소유하지 않고 문서함에 두고 설비가 '참조 링크'. 기기 로컬(IndexedDB)에만 저장. */
function classifyDoc(name,folder){
  const base=name.replace(/\.[^.]+$/,'');
  const up=base.toUpperCase();
  const noM=base.match(/602-\d-E-(?:SL|LG)-\d{3}-\d{3}/)||base.match(/\d-I-LG-\d{3}(?:-\d{3})?/);
  const docNo=noM?noM[0]:'';
  const f=folder||'';
  let plant='';
  if(/SRF/i.test(f))plant='SRF'; else if(/DH/.test(f))plant='DH'; else if(/PB/.test(f))plant='PB';
  else if(/602-2/.test(base))plant='DH'; else if(/602-1/.test(base))plant='PB';
  else if(/LOGIC/i.test(base)||/설비/.test(f))plant='로직(공통)';
  let level='기타';
  if(/-441-/.test(base)||/KEY SINGLE|22\.?9\s*KV/i.test(up))level='22.9kV 수전';
  else if(/-442-/.test(base)||/6\.?9\s*KV/i.test(up))level='6.9kV';
  else if(/-443-/.test(base)||/460V|380-?220|LOAD CENTER|\bMCC\b|LIGHTING/i.test(up))level='저압(460/380V)';
  else if(/-445-/.test(base)||/UPS|DC\s*110|220V UPS/i.test(up))level='UPS·DC';
  let kind='단선도';
  if(/LOGIC/i.test(up))kind='로직도';
  else if(/LOOP/i.test(up))kind='루프도';
  else if(/-LG-\d/.test(up))kind='로직도';
  else if(/SCHEMATIC/i.test(up))kind='스키매틱';
  else if(/CONFIGURATION.*(CONTROL|MONITORING)/i.test(up))kind='제어·감시';
  else if(/SYNCHRO|PHASING/i.test(up))kind='동기·위상';
  else if(/SINGLE LINE|KEY SINGLE/i.test(up))kind='단선도';
  let title=base.replace(/^602-\d-E-(?:SL|LG)-\d{3}-\d{3}\s*\(?D?\)?_?\s*/,'').replace(/_/g,' ').trim();
  if(!title)title=base.replace(/_/g,' ').trim();
  return {docNo,plant,level,kind,title};
}
const _isDrawFile=n=>/(602-\d-E-(SL|LG)|\d-I-LG-|SINGLE LINE|LOGIC|LOAD CENTER|\bMCC\b|SWITCHGEAR|LIGHTING|UPS|SCHEMATIC|LOOP|CONFIGURATION|ACB|수처리동)/i.test(n)&&/\.(pdf|jpe?g|png)$/i.test(n);
async function importDocs(){
  const inp=document.createElement('input');inp.type='file';inp.multiple=true;
  try{inp.webkitdirectory=true;}catch(e){}
  inp.onchange=async()=>{

    sc.onload=()=>{if(window.pdfjsLib){window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';res(window.pdfjsLib);}else rej(new Error('pdf.js 초기화 실패'));};
    sc.onerror=()=>rej(new Error('pdf.js 로드 실패(인터넷 필요)'));

async function viewPdf(blob,label,startPage){

  let pdf;try{pdf=await lib.getDocument({data:buf}).promise;}catch(e){toast('PDF 열기 실패: '+e.message);return;}

      <span id="p-ind" style="font-size:13px;min-width:56px;text-align:center">1/${pdf.numPages}</span>
      <button class="btn ghost sm" id="p-next">▶</button>
      <span class="grow" style="font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(label||'')}</span>
      <button class="btn ghost sm" id="p-out">−</button><button class="btn ghost sm" id="p-in">＋</button>
      <button class="btn sm" id="p-x">닫기</button></div>

  async function render(){
    if(busy){pend=true;return;}
    busy=true;
    try{
      const pg=await pdf.getPage(page);

      if(fit)scale=Math.min((wrap.clientWidth-8)/base.width,1.8);
      const dpr=window.devicePixelRatio||1;

  v.querySelector('#p-next').onclick=()=>{if(page<pdf.numPages){page++;fit=true;render();wrap.scrollTop=0;}};
  v.querySelector('#p-in').onclick=()=>{fit=false;scale=Math.min(scale*1.3,6);render();};
  v.querySelector('#p-out').onclick=()=>{fit=false;scale=Math.max(scale/1.3,.2);render();};
  v.querySelector('#p-x').onclick=()=>{v.remove();try{pdf.destroy();}catch(e){}};
  // 확대: 마우스 휠(그냥 굴리면 확대/축소) + 모바일 두 손가락 핀치

/* 이미지 뷰어(문서함용) — viewDrawing과 동일 로직, blob URL 사용 */
function viewImageUrl(src,label,revoke){
  const v=document.createElement('div');v.className='viewer';
  v.innerHTML=`<div class="vbar"><span class="grow" style="font-size:13px">${esc(label||'')}</span>
      <button class="btn ghost sm" id="vz-out">−</button><button class="btn ghost sm" id="vz-in">＋</button>
      <button class="btn sm" id="vz-x">닫기</button></div>
    <div class="vwrap"><img draggable="false"></div>`;
  document.body.appendChild(v);
  const img=v.querySelector('img'),wrap=v.querySelector('.vwrap');img.src=src;
  let sc=1,tx=0,ty=0;const apply=()=>img.style.transform=`translate(${tx}px,${ty}px) scale(${sc})`;
  img.onload=()=>{sc=Math.min(wrap.clientWidth/img.naturalWidth,wrap.clientHeight/img.naturalHeight,1);tx=(wrap.clientWidth-img.naturalWidth*sc)/2;ty=20;apply()};
  const zoom=(f,cx,cy)=>{const ns=Math.min(Math.max(sc*f,.1),12);tx=cx-(cx-tx)*ns/sc;ty=cy-(cy-ty)*ns/sc;sc=ns;apply()};
  v.querySelector('#vz-in').onclick=()=>zoom(1.4,wrap.clientWidth/2,wrap.clientHeight/2);
  v.querySelector('#vz-out').onclick=()=>zoom(1/1.4,wrap.clientWidth/2,wrap.clientHeight/2);
  const close=()=>{v.remove();if(revoke)setTimeout(()=>URL.revokeObjectURL(src),300)};
  v.querySelector('#vz-x').onclick=close;
  wrap.addEventListener('wheel',e=>{e.preventDefault();zoom(e.deltaY<0?1.15:1/1.15,e.offsetX,e.offsetY)},{passive:false});
  const pts=new Map();let lastDist=0;
  wrap.addEventListener('pointerdown',e=>{pts.set(e.pointerId,{x:e.clientX,y:e.clientY});wrap.setPointerCapture(e.pointerId)});
  wrap.addEventListener('pointermove',e=>{
    if(!pts.has(e.pointerId))return;const p=pts.get(e.pointerId);
    if(pts.size===1){tx+=e.clientX-p.x;ty+=e.clientY-p.y;pts.set(e.pointerId,{x:e.clientX,y:e.clientY});apply();}
    else if(pts.size===2){pts.set(e.pointerId,{x:e.clientX,y:e.clientY});const a=[...pts.values()];const dist=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);if(lastDist){const cx=(a[0].x+a[1].x)/2,cy=(a[0].y+a[1].y)/2;zoom(dist/lastDist,cx,cy);}lastDist=dist;}
  });
  const up=e=>{pts.delete(e.pointerId);if(pts.size<2)lastDist=0;};
  wrap.addEventListener('pointerup',up);wrap.addEventListener('pointercancel',up);
}
/* 설비 ↔ 도면 참조 링크 */
function vlMatch(vl,lvl){
  if(!vl||!lvl)return false;
  if(/22\.9/.test(vl))return /22\.9/.test(lvl);
  if(/6\.9/.test(vl))return /6\.9/.test(lvl);
  if(/460/.test(vl))return /460|저압/.test(lvl);
  if(/110|제어/.test(vl))return /UPS·DC|110|제어/.test(lvl);
  return false;
}
function hasMatch(e){
  if((e.docRefs||[]).some(id=>S.docs.some(d=>d.id===id)))return true;
  if(!S.docs.length)return false;
  const vl=voltLine(e);
  return S.docs.some(d=>(e.plant&&d.plant===e.plant)||vlMatch(vl,d.level||''));
}
function matchedDocs(e){
  if(!S.docs.length)return [];
  const txt=((e.group||'')+' '+(e.feeder||'')+' '+(e.category||'')+' '+(e.name||'')).toUpperCase();
  const vl=voltLine(e);const tag=(e.tagNo||'').toLowerCase();const linked=new Set(e.docRefs||[]);
  return S.docs.map(d=>{
    let sc=0;
    if(linked.has(d.id))sc+=10;
    if(e.plant&&d.plant&&d.plant===e.plant)sc+=1;
    if(vlMatch(vl,d.level||''))sc+=2;
    if(/MCC/.test(txt)&&/MCC/i.test((d.title||'')+(d.level||'')))sc+=1;
    if(/LOAD CENTER|\bLC\b/.test(txt)&&/LOAD CENTER/i.test(d.title||''))sc+=1;
    if(/UPS|축전지|DC/i.test(txt)&&/UPS·DC/.test(d.level||''))sc+=2;
    if(tag&&tag.length>=4&&d.pages&&d.pages.some(pg=>pg.includes(tag)))sc+=5;
    return {d,sc};
  }).filter(x=>x.sc>0).sort((a,b)=>b.sc-a.sc).slice(0,10);
}
async function pinDoc(equipId,docId){

function suggestDocsFor(e){

function _downscale(file,maxDim,q,cb){
  const rd=new FileReader();
  rd.onload=()=>{const img=new Image();img.onload=()=>{
    let w=img.naturalWidth,h=img.naturalHeight;const r=Math.min(1,maxDim/Math.max(w,h));
    w=Math.round(w*r);h=Math.round(h*r);
    const c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    try{cb(c.toDataURL('image/jpeg',q));}catch(e){cb(rd.result);}
  };img.onerror=()=>cb(rd.result);img.src=rd.result;};
  rd.readAsDataURL(file);
}
function _photoBack(refType,refId){
  if(refType==='fault'){const f=S.faults.find(x=>x.id===refId);editFault(refId,f?f.equipId:'');}
  else if(refType==='equip')openEquip(refId);
  else if(refType==='checklog')openCheckResult(refId);
  else if(refType==='inspection')openInsp(refId);
  else if(refType==='note'){const n=S.notes.find(x=>x.id===refId);editNote(refId,n?n.equipId:'');}
}
function addPhoto(refType,refId){
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  try{inp.capture='environment';}catch(e){}
  inp.onchange=()=>{const f=inp.files&&inp.files[0];if(!f)return;
    _downscale(f,1600,0.8,async(dataUrl)=>{
      const rec={id:'PH'+uid(),refType,refId,dataUrl,caption:'',added:todayStr()};
      await dbPut('photos',rec);S.photos.push(rec);toast('사진 저장(기기 로컬)');_photoBack(refType,refId);
    });};
  inp.click();
}

/* ================= PART 9.11 : 도면 텍스트 색인 & 설비명 검색 (Phase 5) ================= */
async function extractPdfText(file){
  try{
    const lib=await loadPdfJs();
    const buf=await file.arrayBuffer();
    const pdf=await lib.getDocument({data:buf}).promise;
    const pages=[];
    for(let i=1;i<=pdf.numPages;i++){
      const pg=await pdf.getPage(i);
      const tc=await pg.getTextContent();
      pages.push(tc.items.map(it=>it.str).join(' ').replace(/\s+/g,' ').toLowerCase());
    }
    try{pdf.destroy();}catch(e){}
    return pages;
  }catch(e){return null;}
}
async function reindexDocs(){
  const pend=S.docs.filter(d=>d.ext==='pdf'&&!(d.pages&&d.pages.length));
  if(!pend.length){toast('색인할 PDF 없음(이미 완료)');return;}
  if(!(await confirmModal(pend.length+'개 PDF의 텍스트를 색인합니다.\n(pdf.js 로드에 인터넷 필요, 시간이 걸립니다) 계속?')))return;
  let n=0,ok=0;
  for(const meta of pend){
    const full=await dbGet('docs',meta.id); if(!full||!full.blob){n++;continue;}
    const pg=await extractPdfText(full.blob);
    if(pg){full.pages=pg;full.text=pg.join(' \n ');await dbPut('docs',full);ok++;}
    n++; toast('색인 '+n+'/'+pend.length);
  }
  await loadAll();render();toast('색인 완료: '+ok+'/'+pend.length+'건 텍스트 있음');
}
/* v33: 하이픈·공백 무시(압축) 매칭 + 여러 단어 AND */
function _compact(s){const m=[];let c='';for(let i=0;i<s.length;i++){const ch=s[i];if(!/[-_.\s()\/]/.test(ch)){c+=ch;m.push(i);}}return{c,m};}
function _pageCompact(d,i){d._pc=d._pc||{};if(!d._pc[i])d._pc[i]=_compact(d.pages[i]);return d._pc[i];}
function _findTerm(low,cobj,t,tc){
  let i=low.indexOf(t);if(i>=0)return{pos:i,len:t.length};
  if(tc.length>=2&&cobj&&cobj.c){const j=cobj.c.indexOf(tc);if(j>=0)return{pos:cobj.m[j],len:cobj.m[j+tc.length-1]-cobj.m[j]+1};}
  return null;
}
function _snippet(text,hit){
  if(!hit)return '';
  const a=Math.max(0,hit.pos-18);return (a>0?'…':'')+text.slice(a,hit.pos+hit.len+34).trim()+'…';
}
function findInDocs(term){
  const q=(term||'').toLowerCase().trim();if(!q)return [];
  const terms=q.split(/\s+/).filter(Boolean);
  const tcs=terms.map(t=>t.replace(/[-_.\s()\/]/g,''));
  const res=[];
  for(const d of S.docs){
    if(d.pages&&d.pages.length){
      for(let i=0;i<d.pages.length;i++){
        const hits=terms.map((t,k)=>_findTerm(d.pages[i],_pageCompact(d,i),t,tcs[k]));
        if(hits.every(h=>h)){res.push({doc:d,page:i+1,snip:_snippet(d.pages[i],hits[0])});break;}
      }
    }else{
      const nm=((d.title||'')+' '+(d.name||'')+' '+(d.docNo||'')).toLowerCase();
      const nc=_compact(nm);
      if(terms.every((t,k)=>_findTerm(nm,nc,t,tcs[k])))res.push({doc:d,page:1,snip:''});
    }
  }
  return res.slice(0,40);
}
/* v33: OCR 인덱스(도면검색인덱스.json) 가져오기 — 파일명 매칭으로 pages/text 주입 */
async function importOcrIndex(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';
  inp.onchange=async()=>{
    const f=inp.files[0];if(!f)return;
    let data;try{data=JSON.parse(await f.text());}catch(e){toast('JSON 파싱 실패: '+e.message);return;}
    const list=Array.isArray(data)?data:(data.files||[]);
    if(!list.length||!list[0].n||!list[0].g){toast('도면검색인덱스.json 형식이 아닙니다');return;}
    const norm=s=>{try{s=(s||'').normalize('NFC');}catch(e){}return s.toLowerCase().trim();};
    const map={};for(const e of list)map[norm(e.n)]=e;
    let hit=0,miss=[];
    for(const meta of S.docs){
      if(meta.ext!=='pdf')continue;
      const e=map[norm(meta.name)];
      if(!e){miss.push(meta.name);continue;}
      const full=await dbGet('docs',meta.id);if(!full){miss.push(meta.name);continue;}
      full.pages=e.g.map(t=>String(t).toLowerCase());
      full.text=full.pages.join(' \n ');
      full.ocrIndexed=true;
      await dbPut('docs',full);hit++;
    }
    await loadAll();render();
    if(hit)toast('OCR 색인 연결 완료: '+hit+'건'+(miss.length?' · 불일치 '+miss.length+'건':''));
    else alert('일치하는 파일명이 없습니다.\n문서함 PDF 파일명과 인덱스 파일명이 같아야 합니다.\n(도면모음/OCR검색본 폴더를 [폴더에서 도면 일괄 가져오기]로 넣은 뒤 다시 시도)');
  };
  inp.click();
}
function openDocSearch(term){S.docQ=term||'';go('docfind');setTimeout(()=>{const el=$('#dfq');if(el)el.focus();},60);}
function renderDocSearch(){
  const q=window._docSearchQ||'';
  const res=findInDocs(q);
  const indexed=S.docs.filter(d=>d.ext==='pdf'&&d.pages&&d.pages.length).length;
  const pdfTot=S.docs.filter(d=>d.ext==='pdf').length;
  openModal(`<h3>🔎 도면에서 설비 찾기</h3>
    <div class="searchwrap"><input id="dsq" placeholder="설비명·태그·피더 (예: 압입송풍기, 121-M-PP, RETURN PUMP)" value="${esc(q)}"
      oninput="window._docSearchQ=this.value;clearTimeout(window._dst);window._dst=setTimeout(renderDocSearchInline,220)"></div>
    <div class="muted">텍스트 색인된 단선도(PDF) ${indexed}/${pdfTot}건에서 검색. 결과를 누르면 해당 페이지로 엽니다.</div>
    <div id="dsres">${docSearchRows(q,res)}</div>
    <div class="row" style="margin-top:10px">
      ${indexed<pdfTot?`<button class="btn ghost sm" onclick="reindexDocs()">미색인 ${pdfTot-indexed}건 재색인</button>`:''}
      <button class="btn ghost sm" onclick="openTagGraph(window._docSearchQ||'')">🕸️ 연결 뷰</button>
      <div class="grow"></div><button class="btn sm" onclick="closeModal()">닫기</button></div>`);
  const el=document.getElementById('dsq');if(el){el.focus();try{el.setSelectionRange(el.value.length,el.value.length)}catch(e){}}
}
function docSearchRows(q,res){
  if(!q)return '<div class="empty">검색어를 입력하세요</div>';
  if(!res.length)return '<div class="empty">일치하는 도면 없음 (미색인 PDF는 아래 재색인)</div>';
  return res.map(r=>`<div class="item click" onclick="viewDocAt('${r.doc.id}',${r.page})">
    <div class="t"><div class="n">${esc(r.doc.title)} <span class="badge b-blue">p.${r.page}</span></div>
    <div class="d">${esc([r.doc.plant,r.doc.level].filter(Boolean).join(' · '))}${r.snip?' · '+esc(r.snip):''}</div></div>
    <span class="badge ${r.doc.ext==='pdf'?'b-blue':'b-green'}">${(r.doc.ext||'').toUpperCase()}</span></div>`).join('');
}
function renderDocSearchInline(){
  const q=window._docSearchQ||'';
  const box=document.getElementById('dsres');
  if(box)box.innerHTML=docSearchRows(q,findInDocs(q));
}

/* ================= PART 9.12 : 계통 연결 뷰 + 해석 노트 (v34) ================= */
const _TG_GROUPS=[['단선도',['단선도','동기·위상']],['로직도',['로직도','제어·감시']],['스키매틱',['스키매틱']],['루프도',['루프도']],['문서·기타',null]];
function _tagGroups(q){
  const query=(q||'').toLowerCase().trim();if(!query)return null;
  const terms=query.split(/\s+/).filter(Boolean);
  const tcs=terms.map(t=>t.replace(/[-_.\s()\/]/g,''));
  const hits=[];
  for(const d of S.docs){
    if(d.pages&&d.pages.length){
      let first=0,cnt=0;
      for(let i=0;i<d.pages.length;i++){
        const hs=terms.map((t,k)=>_findTerm(d.pages[i],_pageCompact(d,i),t,tcs[k]));
        if(hs.every(h=>h)){cnt++;if(!first)first=i+1;}
      }
      if(cnt)hits.push({doc:d,page:first,cnt});
    }else{
      const nm=((d.title||'')+' '+(d.name||'')).toLowerCase();const nc=_compact(nm);
      if(terms.every((t,k)=>_findTerm(nm,nc,t,tcs[k])))hits.push({doc:d,page:1,cnt:1});
    }
  }
  const groups=_TG_GROUPS.map(g=>({name:g[0],kinds:g[1],items:[]}));
  for(const h of hits){
    const g=groups.find(x=>x.kinds&&x.kinds.includes(h.doc.kind));
    (g||groups[groups.length-1]).items.push(h);
  }
  return groups.filter(g=>g.items.length);
}
function _tgSvg(q,groups){
  const W=360,nodeW=336,nodeH=36,left=(W-nodeW)/2;
  let y=60;const parts=[];const cx=W/2;
  parts.push(`<rect x="${cx-72}" y="8" rx="16" width="144" height="34" class="tg-c"/><text x="${cx}" y="30" class="tg-ct">${esc(q.toUpperCase().slice(0,14))}</text>`);
  for(const g of groups){
    const gy=y;
    parts.push(`<line x1="${cx}" y1="42" x2="${cx}" y2="${gy}" class="tg-l"/>`);
    parts.push(`<rect x="${cx-62}" y="${gy}" rx="13" width="124" height="26" class="tg-g"/><text x="${cx}" y="${gy+17}" class="tg-gt">${esc(g.name)} · ${g.items.length}</text>`);
    y=gy+34;
    const shown=g.items.slice(0,8);
    shown.forEach((h,idx)=>{
      const yy=y+idx*(nodeH+6);
      parts.push(`<line x1="${cx}" y1="${gy+26}" x2="${left+12}" y2="${yy+nodeH/2}" class="tg-l2"/>`);
      const full=(h.doc.name||h.doc.title||'').replace(/\.pdf$/i,'');
      const l1=full.slice(0,52),l2=full.slice(52,104);
      const sub='p.'+h.page+(h.cnt>1?' 외'+(h.cnt-1):'');
      parts.push(`<g class="tg-n" onclick="viewDocAt('${h.doc.id}',${h.page})"><rect x="${left}" y="${yy}" rx="8" width="${nodeW}" height="${nodeH}"/><text x="${left+8}" y="${yy+14}">${esc(l1)}</text><text x="${left+8}" y="${yy+27}">${esc(l2)}<tspan class="tg-sub">${l2?' · ':''}${esc(sub)}</tspan></text></g>`);
    });
    y+=shown.length*(nodeH+6)+12;
    if(g.items.length>8){parts.push(`<text x="${cx}" y="${y-2}" class="tg-more">… 외 ${g.items.length-8}건은 아래 상세 결과에</text>`);y+=14;}
  }
  return `<svg viewBox="0 0 ${W} ${y}" style="width:100%">${parts.join('')}</svg>`;
}
function _notesFor(q){
  const nq=(q||'').toUpperCase().replace(/[-_.\s]/g,'');if(!nq)return[];
  return (S.dwgnotes||[]).filter(n=>{
    const t=((n.tag||'')+'').toUpperCase().replace(/[-_.\s]/g,'');
    return t&&t===nq;
  });
}
function tagGraphHtml(q){
  if(!(q||'').trim())return '<div class="empty">기기번호를 입력하세요 (예: LC-202)</div>';

  if((q||'').trim()&&!notes.length)h+='<div class="section-note" style="margin-top:8px">이 태그의 해석 노트 없음 — Claude에게 해석을 요청해 JSON으로 받으면 [해석 노트 가져오기]로 추가됩니다.</div>';

}

function _snipHtml(raw,hit,terms){
  const a=Math.max(0,hit.pos-46),b=Math.min(raw.length,hit.pos+hit.len+60);
  let s=(a>0?'…':'')+raw.slice(a,b)+(b<raw.length?'…':'');
  s=esc(s);
  for(const t of terms){if(t.length<2)continue;
    s=s.replace(new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>'<mark>'+m+'</mark>');}
  return s;
}
function docFindResults(q){
  if(!(q||'').trim())return '<div class="empty">검색어를 입력하세요 — 예: LC-202, VCB-501, 압입송풍기</div>';
  const terms=q.toLowerCase().trim().split(/\s+/).filter(Boolean);
  const tcs=terms.map(t=>t.replace(/[-_.\s()\/]/g,''));
  let h='';
  const groups=_tagGroups(q);
  if(groups&&groups.length)h+=`<div class="card"><h2>🕸️ 연계 도면 지도</h2>${_tgSvg(q.trim(),groups)}</div>`;
  h+=_notesFor(q).map(n=>`<div class="card"><h2>📖 ${esc(n.title||n.tag)}</h2>
    ${n.dwg?`<div class="muted">${esc(n.dwg)}</div>`:''}
    <div style="white-space:pre-wrap;font-size:13px;line-height:1.7;margin-top:6px">${esc(n.body||'')}</div>
    <div class="section-note">AI 해석 노트 — 참고용. 조작 전 원본 도면·현장 확인.</div></div>`).join('');
  const out=[];
  for(const d of S.docs){
    if(!(d.pages&&d.pages.length)){
      const nm=((d.title||'')+' '+(d.name||'')+' '+(d.docNo||'')).toLowerCase();const nc=_compact(nm);
      if(terms.every((t,k)=>_findTerm(nm,nc,t,tcs[k])))out.push({d,pages:[]});
      continue;
    }
    const pages=[];
    for(let i=0;i<d.pages.length;i++){
      const hits=terms.map((t,k)=>_findTerm(d.pages[i],_pageCompact(d,i),t,tcs[k]));
      if(hits.every(x=>x))pages.push({p:i+1,hit:hits[0]});
    }
    if(pages.length)out.push({d,pages});
  }
  if(!out.length)return h+(groups&&groups.length?'':'<div class="empty">일치 도면 없음 — OCR 인덱스 가져오기 여부 확인</div>');
  out.sort((a,b)=>b.pages.length-a.pages.length);
  h+=`<div class="card"><h2>📄 상세 결과 <span class="cnt">${out.length}개 도면</span></h2>`+
    out.slice(0,30).map(({d,pages})=>`
    <div style="border-top:1px solid var(--line);padding:8px 0 4px">
      <div class="click" onclick="viewDocAt('${d.id}',${pages[0]?pages[0].p:1})" style="font-weight:700;font-size:13px;word-break:break-all;line-height:1.45">📄 ${esc(d.name||d.title)}</div>
      <div class="muted" style="font-size:11px;margin:2px 0 4px">${esc([d.kind,d.plant,d.level,d.docNo].filter(Boolean).join(' · '))}${pages.length?` · 매치 ${pages.length}페이지`:''}</div>
      ${pages.slice(0,6).map(pp=>`<div class="item click" onclick="viewDocAt('${d.id}',${pp.p})" style="padding:5px 8px">
        <span class="badge b-blue" style="flex:none">p.${pp.p}</span>
        <div class="t"><div class="d" style="word-break:break-all;line-height:1.5">${_snipHtml(d.pages[pp.p-1],pp.hit,terms)}</div></div></div>`).join('')}
      ${pages.length>6?`<div class="muted" style="font-size:11px">… 외 ${pages.length-6}개 페이지</div>`:''}
    </div>`).join('')+
    (out.length>30?`<div class="muted">… 외 ${out.length-30}개 도면</div>`:'')+`</div>`;
  return h;
}

function cycleFromPeriod(l){
  if(l.cycle)return CYCLE_KO[l.cycle]||'';

}

const MEAS_TYPES=[
 {k:'절연저항',u:'MΩ',dir:'hi',warn:1},
 {k:'접지저항',u:'Ω',dir:'lo',warn:100},
 {k:'변압기 유온',u:'℃',dir:'lo',warn:75},
 {k:'베어링 온도',u:'℃',dir:'lo',warn:80},
 {k:'부하전류',u:'A',dir:'',warn:null},
 {k:'절연유 내압',u:'kV',dir:'hi',warn:null},
 {k:'기타',u:'',dir:'',warn:null}
];
function measType(k){return MEAS_TYPES.find(t=>t.k===k)||MEAS_TYPES[MEAS_TYPES.length-1];}
function measJudge(m){
  const t=measType(m.type); if(t.warn==null||m.value===''||m.value==null)return '';
  const v=Number(m.value);
  if(t.dir==='hi')return v<t.warn?'주의':'양호';
  if(t.dir==='lo')return v>t.warn?'주의':'양호';
  return '';
}
function measSummaryHtml(equipId){
  const ms=S.measurements.filter(m=>m.equipId===equipId);
  if(!ms.length)return '<div class="empty">측정 이력 없음 — ＋측정으로 절연저항·접지저항·온도 등 기록</div>';
  const types=[...new Set(ms.map(m=>m.type))];
  return types.map(tp=>{
    const list=ms.filter(m=>m.type===tp).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const vals=list.map(m=>Number(m.value)).filter(v=>!isNaN(v));
    const last=list[0];const u=measType(tp).u;
    const mn=vals.length?Math.min(...vals):null, mx=vals.length?Math.max(...vals):null;
    const j=measJudge(last);
    return `<div class="item click" onclick="measHistory('${equipId}','${esc(tp)}')">
      <div class="t"><div class="n">${esc(tp)} ${j?`<span class="badge ${j==='주의'?'b-red':'b-green'}">${j}</span>`:''}</div>
      <div class="d">최근 ${esc(String(last.value))}${esc(u)} (${esc(last.date||'')}) · 최소 ${mn??'-'} / 최대 ${mx??'-'} · ${list.length}회</div></div>
      <span class="badge b-gray">추세</span></div>`;
  }).join('');
}
function measChart(listAsc){
  const vals=listAsc.map(m=>Number(m.value)).filter(v=>!isNaN(v));
  if(vals.length<2)return '<div class="muted" style="font-size:12px;padding:6px 2px">추세 그래프는 2회 이상 측정 시 표시됩니다.</div>';
  const w=320,h=96,pad=10;const n=vals.length;
  let mn=Math.min(...vals),mx=Math.max(...vals);if(mn===mx){mn=mn-Math.abs(mn||1)*0.1-0.5;mx=mx+Math.abs(mx||1)*0.1+0.5;}
  const X=i=>pad+(w-2*pad)*(n===1?0.5:i/(n-1));
  const Y=v=>h-pad-(h-2*pad)*((v-mn)/(mx-mn));
  const pts=vals.map((v,i)=>X(i).toFixed(1)+','+Y(v).toFixed(1)).join(' ');

function _bar(label,val,max,extra){

function barChart(items){
  const w=340,h=112,pad=18,n=items.length||1;
  const mx=Math.max(1,...items.map(x=>x.value));
  const slot=(w-2*pad)/n, bw=Math.min(slot*0.68,26);
  let svg='';
  items.forEach((it,i)=>{
    const cx=pad+slot*i+slot/2;const bh=(h-2*pad-8)*(it.value/mx);const y=h-pad-bh;
    svg+=`<rect x="${(cx-bw/2).toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(bh,it.value>0?3:0).toFixed(1)}" rx="3" fill="var(--accent)"/>`;
    if(it.value>0)svg+=`<text x="${cx.toFixed(1)}" y="${(y-3).toFixed(1)}" font-size="9" fill="var(--dim)" text-anchor="middle">${it.value}</text>`;
    svg+=`<text x="${cx.toFixed(1)}" y="${h-4}" font-size="8" fill="var(--dim)" text-anchor="middle">${esc(it.label)}</text>`;
  });
  return `<div style="overflow-x:auto"><svg viewBox="0 0 ${w} ${h}" style="height:112px;min-width:${w}px;max-width:100%">${svg}</svg></div>`;
}

function _sampleN(arr,n){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a.slice(0,n);}
function buildQuiz(){
  const eq=S.equipment;const cats=[];
  // 피더(상위 전원)
  cats.push(eq.filter(e=>e.feeder&&e.feeder.trim().length>1).map(e=>({q:`「${e.name}${e.tagNo?' ('+e.tagNo+')':''}」의 상위 전원(피더)은?`,a:e.feeder})));
  // 보호계전기
  cats.push(eq.filter(e=>e.relays&&e.relays.length).map(e=>({q:`「${e.name}」의 보호계전기 요소·정정값은?`,a:(e.relays||[]).join('\n')})));
  // 차단 경로
  cats.push(S.tree.filter(n=>n.type==='load'||n.equipId).map(n=>({q:`「${n.name}」을(를) 정전시키는 차단 경로는? (상위 차단기까지)`,a:blockPathPlain(n.id)})));
  // 전압선
  cats.push(_sampleN(eq.filter(e=>e.name&&voltLine(e)!=='미분류'),10).map(e=>({q:`「${e.name}」의 전압선은?`,a:voltLine(e)})));
  // 플랜트
  cats.push(_sampleN(eq.filter(e=>e.plant),6).map(e=>({q:`「${e.name}」이(가) 속한 플랜트는?`,a:e.plant})));
  // 용도
  cats.push(eq.filter(e=>e.usage&&e.usage.trim()).map(e=>({q:`「${e.name}」의 용도/사용방법은?`,a:e.usage})));
  let pool=[];cats.forEach(c=>{pool=pool.concat(_sampleN(c,8));});
  const seen=new Set();pool=pool.filter(x=>{if(seen.has(x.q))return false;seen.add(x.q);return true;});
  return _sampleN(pool,20);
}
function vStudy(){
  if(!S._quiz)S._quiz=buildQuiz();
  const q=S._quiz;
  if(!q.length)return `<div class="card"><h2>🎴 학습</h2><div class="empty">문제를 만들 데이터가 부족합니다. 설비를 가져오고 계통트리·피더·보호계전기·전압선을 입력하면 자동으로 문제가 생성됩니다.</div><button class="btn ghost sm full" onclick="go('more')">← 더보기</button></div><div class="botpad"></div>`;

    ${rv?`<div class="row"><button class="btn ghost grow" onclick="quizNext(0)">✕ 틀림</button><button class="btn grow" onclick="quizNext(1)">✓ 맞음</button></div>`

    <div class="row" style="margin-top:8px"><button class="btn ghost sm" onclick="S._quiz=buildQuiz();S._qi=0;S._qok=0;S._qrv=0;render()">🔀 새 문제 세트</button><div class="grow"></div><button class="btn ghost sm" onclick="go('more')">← 더보기</button></div>
