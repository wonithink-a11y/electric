  const p=S.procs.find(x=>x.id===id);const doc=p&&p.docId?S.docs.find(d=>d.id===p.docId):null;
  if(!doc||!doc.pages||!doc.pages.length){toast('연결 문서에 텍스트가 없습니다(스캔 PDF/hwp는 수기 입력)');return;}
  const text=doc.pages.join(' ');
  let parts=text.split(/(?=\s\d{1,2}[.)]\s)/).map(x=>x.trim()).filter(x=>x.length>4);
  if(parts.length<2)parts=text.split(/[.。]\s/).map(x=>x.trim()).filter(x=>x.length>8).slice(0,25);
  if(!parts.length){toast('본문에서 단계를 찾지 못함 — 수기 입력하세요');return;}
  p.steps=(p.steps||[]).concat(parts.slice(0,30).map(x=>({t:x.slice(0,140),done:false})));
  p.updated=todayStr();await dbPut('procs',p);openProc(id);toast(parts.length+'개 후보 단계 추가 — 불필요한 건 ✕로 정리하세요');
}
function askProc(id){
  const p=S.procs.find(x=>x.id===id);if(!p)return;
  openModal(`<h3>🤖 매뉴얼 질문</h3>
    <div class="muted">진행상황 + (있으면)원문 텍스트를 담아 질의문을 만듭니다 → 복사 → 외부 AI(Claude/Gemini)에 붙여넣기.</div>
    <label>질문</label><input id="pa-q" value="현재 어디까지 진행됐고 다음에 무엇을 해야 하나?">
    <div class="section-note">⚠️ 원문에 민감정보(실 설비명·판넬 등)가 있으면 붙여넣기 전 확인하세요.</div>
    <div class="row" style="margin-top:12px"><div class="grow"></div><button class="btn ghost sm" onclick="openProc('${id}')">취소</button><button class="btn sm" onclick="genProcAsk('${id}')">질의문 생성</button></div>`);
}
function genProcAsk(id){
  const p=S.procs.find(x=>x.id===id);if(!p)return;
  const q=($('#pa-q').value||'').trim();
  const doc=p.docId?S.docs.find(d=>d.id===p.docId):null;
  const steps=p.steps||[];const done=steps.filter(s=>s.done);const rem=steps.filter(s=>!s.done);
  let t=`[매뉴얼/절차 진행 질의]\n절차: ${p.title}\n`;
  if(doc)t+=`문서: ${doc.title}${doc.kind?' ('+doc.kind+')':''}\n`;
  t+=`진행: ${done.length}/${steps.length} 단계 완료\n`;
  t+=`완료 단계:\n${done.length?done.map(s=>' - '+s.t).join('\n'):' (없음)'}\n`;
  t+=`남은 단계:\n${rem.length?rem.map(s=>' - '+s.t).join('\n'):' (없음)'}\n`;
  if(doc&&doc.pages&&doc.pages.length){t+=`\n[문서 본문 발췌]\n${doc.pages.join(' ').slice(0,1600)}\n`;}
  t+=`\n질문: ${q||'현재 진행상황과 다음 단계는?'}\n요청: 위 진행 기준으로 (1)현재 어디까지 왔는지 (2)다음에 무엇을 해야 하는지 (3)주의사항을 정리해줘.`;
  closeModal();openDoc('매뉴얼 진행 질의',t);
}

/* ================= PART 10 : 라우팅 & 초기화 ================= */
const VIEWS={home:vHome,equip:vEquip,tree:vTree,insp:vInsp,chk:vChk,docfind:vDocFind,more:vMore,spare:vSpare,budget:vBudget,stats:vStats,study:vStudy,law:vLaw,proc:vProc,notes:vNotes};
const TITLES={home:'전력계통과 업무',equip:'설비 마스터',tree:'전원계통·차단범위',insp:'법정검사',chk:'주기 체크리스트',more:'더보기',spare:'예비품 재고',budget:'예산 집계',stats:'실적 요약',study:'계통 학습',law:'법령 내비게이터',proc:'매뉴얼 진행 추적',notes:'업무 메모'};
function go(v){S.view=v;render();window.scrollTo(0,0)}
function render(){
  $('#app').innerHTML=(VIEWS[S.view]||vHome)();
  $('#hd-title').textContent=TITLES[S.view]||'';
  $('#hd-sub').textContent=todayStr();
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===S.view));
}
document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>go(b.dataset.v));
/* 테마(다크/라이트) */
function applyTheme(t){
  if(t==='light')document.documentElement.setAttribute('data-theme','light');
  else document.documentElement.removeAttribute('data-theme');
  window._theme=(t==='light')?'light':'dark';
  const b=document.getElementById('theme-btn');if(b)b.textContent=(window._theme==='light')?'\u2600\ufe0f':'\ud83c\udf19';
  const mc=document.querySelector('meta[name=theme-color]');if(mc)mc.setAttribute('content',(window._theme==='light')?'#ffffff':'#0e1626');
}
async function toggleTheme(){
  const nx=(window._theme==='light')?'dark':'light';
  applyTheme(nx);
  try{await dbPut('meta',{id:'theme',v:nx});}catch(e){}
}
(async function init(){
  try{
    await openDB();
    await loadAll();
    try{const th=await dbGet('meta','theme');applyTheme(th&&th.v?th.v:'dark');}catch(e){applyTheme('dark');}
    render();
    if(S._fbCfg){try{await fbEnsureInit();}catch(e){console.warn('firebase 자동연결 실패',e);}}
  }catch(e){
    $('#app').innerHTML=`<div class="card"><h2>초기화 오류</h2><div class="muted">${esc(e.message)}</div></div>`;
  }
})();
/* PWA: manifest.json은 <head>에서 정적 링크로 연결됨(icon 포함). 서비스워커 등록 */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./service-worker.js').catch(e=>console.warn('SW 등록 실패',e));
  });
}

/* ===== 뒤로가기(back) 처리: 모달/뷰어 닫기 → 이전 화면 → 종료 확인 =====
   항상 history에 'guard' 항목 하나를 깔아둔다. 뒤로가기(popstate)가 오면
   현재 열려있는 레이어(뷰어 > 모달 > 종료확인 자체)를 확인해 하나만 닫고,
   guard를 다시 채워 넣어 다음 뒤로가기도 감지되게 한다.
   맨 앞(홈) 화면에서 더 닫을 게 없으면 종료 확인 팝업을 띄운다. */
history.replaceState({t:'root'},'',location.href);
history.pushState({t:'guard'},'',location.href);

function _refillGuard(){ history.pushState({t:'guard'},'',location.href); }

function showExitConfirm(){
  _refillGuard();
  if(document.getElementById('exit-confirm'))return;
  const box=document.createElement('div');
  box.id='exit-confirm';
  box.innerHTML=`<div style="position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:95;display:flex;align-items:center;justify-content:center">
    <div style="background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px;max-width:280px;width:80%;text-align:center">
      <p style="margin:0 0 16px">electric 앱을 종료할까요?</p>
      <div style="display:flex;gap:8px">
        <button class="btn ghost" id="exit-cancel" style="flex:1">취소</button>
        <button class="btn" id="exit-ok" style="flex:1">종료</button>
      </div>
    </div>
  </div>`;
  document.body.appendChild(box);
  document.getElementById('exit-cancel').onclick=()=>box.remove();
  document.getElementById('exit-ok').onclick=()=>{ box.remove(); history.go(-2); };
}

/* 브라우저 기본 confirm()/prompt()는 항상 사이트 주소(예: wonithink-a11y.github.io)를 함께
   표시하는 브라우저 UI라 JS로 숨길 수 없음 — 앱 자체 오버레이로 대체 (v43) */
function confirmModal(msg){
  return new Promise(resolve=>{
    const old=document.getElementById('cf-modal');if(old)old.remove();
    const box=document.createElement('div');
    box.id='cf-modal';
    box.innerHTML=`<div style="position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:120;display:flex;align-items:center;justify-content:center">
      <div style="background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px;max-width:300px;width:82%;text-align:center">
        <p style="margin:0 0 16px;white-space:pre-wrap">${esc(msg)}</p>
        <div style="display:flex;gap:8px">
          <button class="btn ghost" id="cf-cancel" style="flex:1">취소</button>
          <button class="btn" id="cf-ok" style="flex:1">확인</button>
        </div>
      </div>
    </div>`;
    document.body.appendChild(box);
    document.getElementById('cf-cancel').onclick=()=>{box.remove();resolve(false);};
    document.getElementById('cf-ok').onclick=()=>{box.remove();resolve(true);};
  });
}
function promptModal(msg,defVal){
  return new Promise(resolve=>{
    const old=document.getElementById('pm-modal');if(old)old.remove();
    const box=document.createElement('div');
    box.id='pm-modal';
    box.innerHTML=`<div style="position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:120;display:flex;align-items:center;justify-content:center">
      <div style="background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px;max-width:300px;width:82%;text-align:center">
        <p style="margin:0 0 12px;white-space:pre-wrap">${esc(msg)}</p>
        <input id="pm-input" type="password" value="${esc(defVal||'')}" style="width:100%;margin-bottom:16px;text-align:center">
        <div style="display:flex;gap:8px">
          <button class="btn ghost" id="pm-cancel" style="flex:1">취소</button>
          <button class="btn" id="pm-ok" style="flex:1">확인</button>
        </div>
      </div>
    </div>`;
    document.body.appendChild(box);
    const inp=document.getElementById('pm-input');inp.focus();
    inp.onkeydown=ev=>{if(ev.key==='Enter'){box.remove();resolve(inp.value);}};
    document.getElementById('pm-cancel').onclick=()=>{box.remove();resolve(null);};
    document.getElementById('pm-ok').onclick=()=>{box.remove();resolve(inp.value);};
  });
}

window.addEventListener('popstate',()=>{
  const exitBox=document.getElementById('exit-confirm');
  if(exitBox){ exitBox.remove(); _refillGuard(); return; }

  const viewerEl=document.querySelector('.viewer');
  if(viewerEl){ viewerEl.remove(); _refillGuard(); return; }

  const modalRoot=document.getElementById('modal-root');
  if(modalRoot && modalRoot.innerHTML.trim()!==''){ modalRoot.innerHTML=''; _refillGuard(); return; }

  if(typeof S!=='undefined' && S.view && S.view!=='home'){
    S.view='home'; render(); _refillGuard(); return;
  }

  showExitConfirm();
});
/* v2 end */
